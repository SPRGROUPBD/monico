<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Bill Management System</title>

<style>

body{
font-family:Tahoma;
background:#c0c0c0;
margin:0;
}

.header{
background:#000080;
color:white;
padding:12px;
text-align:center;
font-size:18px;
font-weight:bold;
}

.container{
display:flex;
justify-content:space-between;
padding:15px;
gap:10px;
}

.sidebar,.rightbar{
width:48%;
background:#d4d0c8;
padding:10px;
border:2px solid #808080;
}

.vbbtn{
display:flex;
align-items:center;
gap:10px;
width:100%;
padding:12px;
margin-bottom:10px;
background:#e0e0e0;
border:2px outset white;
cursor:pointer;
font-weight:bold;
font-size:14px;
}

.vbbtn:active{
border:2px inset #808080;
}

.icon{
width:22px;
height:22px;
}

.footer{
background:#000080;
color:white;
text-align:center;
padding:8px;
font-size:12px;
position:fixed;
bottom:0;
width:100%;
}

/* Desktop Layout */

@media (min-width:768px){

.container{
max-width:900px;
margin:auto;
}

.sidebar,.rightbar{
width:200px;
}

}

</style>
</head>

<body>

<div class="header">
Bill Management System
</div>

<div class="container">

<!-- LEFT BUTTONS -->

<div class="sidebar">

<button class="vbbtn" onclick="openPage('https://sprgroupbd.github.io/monico/bill')">
<img src="https://img.icons8.com/ios-filled/50/edit.png" class="icon">
Bill Entry
</button>

<button class="vbbtn" onclick="openPage('iou.html')">
<img src="https://img.icons8.com/ios-filled/50/money.png" class="icon">
IOU Entry
</button>

<button class="vbbtn" onclick="openPage('history.html')">
<img src="https://img.icons8.com/ios-filled/50/activity-history.png" class="icon">
History
</button>

</div>

<!-- RIGHT BUTTONS -->

<div class="rightbar">

<button class="vbbtn" onclick="openPage('print.html')">
<img src="https://img.icons8.com/ios-filled/50/print.png" class="icon">
Print Bill
</button>

<button class="vbbtn" onclick="openPage('report.html')">
<img src="https://img.icons8.com/ios-filled/50/combo-chart.png" class="icon">
Report
</button>

<button class="vbbtn" onclick="openPage('settings.html')">
<img src="https://img.icons8.com/ios-filled/50/settings.png" class="icon">
Settings
</button>

</div>

</div>

<div class="footer">
Developed By: <b>Md Sajjad Ahmed</b>
</div>

<script>

function openPage(page){
window.location.href = page;
}

</script>

</body>
</html>
