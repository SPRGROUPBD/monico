<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kisti - Smart Installment Manager</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@300;400;500;600;700&display=swap');

        body {
            font-family: 'Hind Siliguri', sans-serif;
            background-color: #f3f4f6;
        }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }

        /* Loader */
        .loader {
            border: 3px solid #f3f3f3;
            border-radius: 50%;
            border-top: 3px solid #3b82f6;
            width: 24px;
            height: 24px;
            -webkit-animation: spin 1s linear infinite;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* Toast */
        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        .toast-enter { animation: slideIn 0.3s ease-out forwards; }

        /* Print Styles */
        #print-container { display: none; }

        @media print {
            body * { visibility: hidden; }
            #print-container, #print-container * { visibility: visible; }
            #print-container {
                display: block;
                position: absolute;
                left: 0;
                top: 0;
                width: 100%;
                margin: 0;
                padding: 0;
                background: white;
                z-index: 9999;
            }
            .no-print { display: none !important; }
        }

        .invoice-box {
            max-width: 800px;
            margin: auto;
            padding: 30px;
            border: 1px solid #eee;
            font-size: 16px;
            line-height: 24px;
            color: #555;
            background: white;
        }
    </style>
</head>
<body class="text-gray-800 h-screen flex overflow-hidden">

    <!-- Toast Container -->
    <div id="toast-container" class="fixed top-5 right-5 z-50 flex flex-col gap-2 pointer-events-none"></div>

    <!-- Login Screen -->
    <div id="login-screen" class="fixed inset-0 z-40 bg-gradient-to-br from-blue-600 to-purple-700 flex items-center justify-center">
        <div class="bg-white p-8 rounded-lg shadow-2xl w-full max-w-md animate-bounce-in">
            <div class="text-center mb-6">
                <h1 class="text-4xl font-bold text-blue-600 tracking-wider">কিস্তি (Kisti)</h1>
                <p class="text-gray-500 text-sm mt-1">স্মার্ট ইনস্টলমেন্ট ম্যানেজমেন্ট সিস্টেম</p>
            </div>
            <form id="login-form" class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700">ইউজার আইডি</label>
                    <input type="text" id="login-id" class="mt-1 block w-full px-4 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-blue-500 focus:border-blue-500 transition" placeholder="e.g. KS">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700">পাসওয়ার্ড</label>
                    <div class="relative">
                        <input type="password" id="login-password" class="mt-1 block w-full px-4 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-blue-500 focus:border-blue-500" placeholder="••••••••">
                        <button type="button" onclick="togglePassword('login-password')" class="absolute inset-y-0 right-0 pr-3 flex items-center text-gray-500">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                </div>
                <button type="submit" class="w-full flex justify-center py-2 px-4 border border-transparent rounded-md shadow-sm text-sm font-medium text-white bg-blue-600 hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500 transition transform hover:scale-105">
                    লগইন করুন
                </button>
            </form>
            <div id="login-error" class="mt-4 text-red-500 text-sm text-center hidden"></div>
        </div>
    </div>

    <!-- Main App Structure -->
    <div id="app-interface" class="flex w-full h-full hidden">
        
        <!-- Sidebar -->
        <aside id="sidebar" class="bg-gray-900 text-white w-64 flex-shrink-0 hidden md:flex flex-col transition-all duration-300 shadow-xl z-20">
            <div class="h-16 flex items-center justify-center border-b border-gray-700 bg-gray-800">
                <h2 class="text-xl font-bold tracking-wider"><i class="fas fa-wallet mr-2"></i>কিস্তি ম্যানেজার</h2>
            </div>
            
            <nav class="flex-1 overflow-y-auto py-4">
                <ul class="space-y-1" id="sidebar-menu">
                    <!-- Menu items injected via JS -->
                </ul>
            </nav>

            <div class="p-4 border-t border-gray-700 bg-gray-800">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 rounded-full bg-blue-600 flex items-center justify-center font-bold text-lg shadow-lg" id="user-avatar">U</div>
                    <div>
                        <p class="text-sm font-medium" id="user-name-display">User</p>
                        <p class="text-xs text-gray-400" id="user-role-display">Role</p>
                    </div>
                </div>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="flex-1 flex flex-col h-full overflow-hidden relative bg-gray-50">
            <!-- Top Header -->
            <header class="h-16 bg-white shadow flex items-center justify-between px-6 z-10 no-print">
                <div class="flex items-center gap-4">
                    <button id="sidebar-toggle" class="md:hidden text-gray-500 hover:text-gray-700">
                        <i class="fas fa-bars text-xl"></i>
                    </button>
                    <h2 id="page-title" class="text-xl font-bold text-gray-800">ড্যাশবোর্ড</h2>
                </div>
                <div class="flex items-center gap-4">
                    <div id="connection-status" class="flex items-center gap-1 text-xs font-bold px-2 py-1 bg-gray-100 rounded">
                        <span class="w-2 h-2 rounded-full bg-red-500" id="status-dot"></span>
                        <span id="status-text">অফলাইন</span>
                    </div>
                    <button onclick="logout()" class="text-red-500 hover:text-red-700 transition">
                        <i class="fas fa-sign-out-alt"></i> <span class="hidden md:inline">লগআউট</span>
                    </button>
                </div>
            </header>

            <!-- Dynamic View Container -->
            <div id="view-container" class="flex-1 overflow-auto p-4 md:p-6 relative">
                <!-- Content injected here -->
            </div>
        </main>
    </div>

    <!-- Hidden Print Container -->
    <div id="print-container"></div>

    <!-- JavaScript Logic -->
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyB6ar_YscR6d9e-f_VcSMXBTpFz5NAT648",
            authDomain: "kisti-5f738.firebaseapp.com",
            databaseURL: "https://kisti-5f738-default-rtdb.firebaseio.com",
            projectId: "kisti-5f738",
            storageBucket: "kisti-5f738.firebasestorage.app",
            messagingSenderId: "1087007808740",
            appId: "1:1087007808740:web:dfa9e6dc6717eda77560f1"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // --- State Management ---
        const state = {
            user: null,
            users: {},
            customers: {},
            products: {},
            sales: {},
            salesRequests: {}, 
            settings: {
                shopName: 'কিস্তি শপ',
                address: 'ঢাকা, বাংলাদেশ',
                mobile: '01700000000',
                interestRates: [{ id: 1, rate: 10, type: 'flat', name: 'ডিফল্ট ১০%' }],
                categories: ['Mobile', 'Laptop', 'Electronics'] 
            },
            isConnected: false,
            chartInstances: {},
            saleDraft: {}
        };

        // --- Helper Functions ---
        const formatCurrency = (amount) => {
            return new Intl.NumberFormat('bn-BD', { style: 'currency', currency: 'BDT', minimumFractionDigits: 0 }).format(amount || 0);
        };

        const formatDate = (timestamp) => {
            if (!timestamp) return '';
            const date = new Date(timestamp);
            if(isNaN(date.getTime())) return timestamp; 
            return date.toLocaleDateString('en-GB'); 
        };

        const showToast = (message, type = 'info') => {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            const colors = { success: 'bg-green-500', error: 'bg-red-500', info: 'bg-blue-500', warning: 'bg-yellow-500' };
            const icons = { success: 'fa-check-circle', error: 'fa-exclamation-circle', info: 'fa-info-circle', warning: 'fa-exclamation-triangle' };
            toast.className = `${colors[type]} text-white px-4 py-3 rounded shadow-lg toast-enter flex items-center gap-2 min-w-[250px] pointer-events-auto transform transition-all duration-300 hover:scale-105`;
            toast.innerHTML = `<i class="fas ${icons[type]}"></i><span class="text-sm font-medium">${message}</span>`;
            container.appendChild(toast);
            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transform = 'translateX(100%)';
                setTimeout(() => toast.remove(), 300);
            }, 4000);
        };

        const togglePassword = (id) => {
            const input = document.getElementById(id);
            input.type = input.type === 'password' ? 'text' : 'password';
        };

        const readURL = (input, targetId) => {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    const target = document.getElementById(targetId);
                    if(target) target.value = e.target.result;
                    const previewId = targetId.replace('_input', '_preview');
                    const preview = document.getElementById(previewId);
                    if(preview) {
                        preview.src = e.target.result;
                        preview.classList.remove('hidden');
                    }
                }
                reader.readAsDataURL(input.files[0]);
            }
        };

        // --- Firebase Connectivity ---
        const connectedRef = db.ref(".info/connected");
        connectedRef.on("value", (snap) => {
            state.isConnected = snap.val();
            const dot = document.getElementById('status-dot');
            const text = document.getElementById('status-text');
            if (state.isConnected) {
                dot.className = "w-2 h-2 rounded-full bg-green-500 animate-pulse";
                text.innerText = "অনলাইন";
                text.className = "text-green-600";
            } else {
                dot.className = "w-2 h-2 rounded-full bg-red-500";
                text.innerText = "অফলাইন";
                text.className = "text-red-500";
            }
        });

        function initializeDataListeners() {
            db.ref('users').on('value', snap => state.users = snap.val() || {});
            db.ref('customers').on('value', snap => state.customers = snap.val() || {});
            db.ref('products').on('value', snap => state.products = snap.val() || {});
            db.ref('sales').on('value', snap => { state.sales = snap.val() || {}; });
            db.ref('salesRequests').on('value', snap => { state.salesRequests = snap.val() || {}; }); 
            db.ref('settings').on('value', snap => {
                const val = snap.val();
                state.settings = val || state.settings;
                if(!state.settings.interestRates) state.settings.interestRates = [];
                if(!state.settings.categories) state.settings.categories = ['Mobile', 'Electronics'];
            });
        }

        // --- Authentication ---
        function checkSession() {
            const sessionUser = localStorage.getItem('kisti_user');
            if (sessionUser) {
                state.user = JSON.parse(sessionUser);
                loadApp();
            } else {
                document.getElementById('login-screen').classList.remove('hidden');
                document.getElementById('app-interface').classList.add('hidden');
            }
        }

        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const id = document.getElementById('login-id').value.trim();
            const pass = document.getElementById('login-password').value;
            const errorDiv = document.getElementById('login-error');
            const btn = e.target.querySelector('button');

            btn.innerHTML = '<div class="loader border-white border-t-transparent mr-2"></div> লগইন হচ্ছে...';
            btn.disabled = true;
            errorDiv.classList.add('hidden');

            try {
                const adminSnapshot = await db.ref('users/KS').get();
                if (!adminSnapshot.exists()) {
                    await db.ref('users/KS').set({
                        username: 'KS', password: '1234', role: 'admin', name: 'Super Admin', createdAt: Date.now()
                    });
                }

                const snapshot = await db.ref('users/' + id).get();
                if (snapshot.exists() && snapshot.val().password === pass) {
                    const user = snapshot.val();
                    user.id = id;
                    state.user = user;
                    localStorage.setItem('kisti_user', JSON.stringify(user));
                    loadApp();
                } else {
                    errorDiv.innerText = 'ভুল ইউজার আইডি বা পাসওয়ার্ড!';
                    errorDiv.classList.remove('hidden');
                }
            } catch (err) {
                console.error(err);
                errorDiv.innerText = 'নেটওয়ার্ক ত্রুটি!';
                errorDiv.classList.remove('hidden');
            } finally {
                btn.innerHTML = 'লগইন করুন';
                btn.disabled = false;
            }
        });

        function logout() {
            localStorage.removeItem('kisti_user');
            state.user = null;
            location.reload();
        }

        function loadApp() {
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('app-interface').classList.remove('hidden');
            document.getElementById('user-name-display').innerText = state.user.name || state.user.username;
            document.getElementById('user-role-display').innerText = state.user.role.toUpperCase();
            document.getElementById('user-avatar').innerText = state.user.name.charAt(0).toUpperCase();
            renderSidebar();
            initializeDataListeners();
            router('dashboard');
        }

        // --- Routing ---
        function renderSidebar() {
            const menu = document.getElementById('sidebar-menu');
            const role = state.user.role;
            
            let items = [];
            items.push({ id: 'dashboard', icon: 'fa-tachometer-alt', label: 'ড্যাশবোর্ড', roles: ['admin', 'manager', 'salesman'] });
            
            if (role === 'salesman') {
                items.push({ id: 'new-request', icon: 'fa-plus-circle', label: 'নতুন রিকোয়েস্ট', roles: ['salesman'] });
                items.push({ id: 'my-requests', icon: 'fa-list', label: 'আমার রিকোয়েস্ট', roles: ['salesman'] });
            }
            
            if (role === 'admin' || role === 'manager') {
                items.push({ id: 'requests-approval', icon: 'fa-check-double', label: 'রিকোয়েস্ট অ্যাপ্রুভাল', roles: ['admin', 'manager'] });
                items.push({ id: 'collection', icon: 'fa-hand-holding-usd', label: 'কিস্তি আদায়', roles: ['admin', 'manager'] });
                items.push({ id: 'customers', icon: 'fa-users', label: 'গ্রাহক তালিকা', roles: ['admin', 'manager', 'salesman'] });
                items.push({ id: 'products', icon: 'fa-box', label: 'পণ্য স্টক', roles: ['admin', 'manager'] });
                items.push({ id: 'reports', icon: 'fa-chart-line', label: 'রিপোর্ট', roles: ['admin', 'manager'] });
                items.push({ id: 'users', icon: 'fa-user-shield', label: 'ইউজার', roles: ['admin'] });
                items.push({ id: 'settings', icon: 'fa-cog', label: 'সেটিংস', roles: ['admin'] });
            }

            menu.innerHTML = items.filter(item => item.roles.includes(role))
                .map(item => `
                    <li>
                        <button onclick="router('${item.id}')" id="nav-${item.id}" class="w-full text-left px-6 py-3 hover:bg-gray-800 flex items-center gap-3 transition-colors text-gray-300 hover:text-white border-l-4 border-transparent hover:border-blue-500">
                            <i class="fas ${item.icon} w-5"></i> ${item.label}
                        </button>
                    </li>
                `).join('');
        }

        function router(view) {
            const container = document.getElementById('view-container');
            const title = document.getElementById('page-title');
            container.innerHTML = '<div class="flex justify-center items-center h-full"><div class="loader"></div></div>';
            
            document.querySelectorAll('#sidebar-menu button').forEach(b => {
                b.classList.remove('bg-gray-800', 'text-white', 'border-blue-500');
                b.classList.add('border-transparent');
            });
            const activeBtn = document.getElementById(`nav-${view}`);
            if(activeBtn) {
                activeBtn.classList.add('bg-gray-800', 'text-white', 'border-blue-500');
                activeBtn.classList.remove('border-transparent');
            }

            setTimeout(() => {
                switch(view) {
                    case 'dashboard': renderDashboard(container); title.innerText = 'ড্যাশবোর্ড'; break;
                    case 'customers': renderCustomers(container); title.innerText = 'গ্রাহক তালিকা'; break;
                    case 'products': renderProducts(container); title.innerText = 'পণ্য স্টক'; break;
                    case 'new-request': renderSalesWizard(container); title.innerText = 'নতুন বিক্রয় রিকোয়েস্ট'; break;
                    case 'requests-approval': renderSalesRequests(container); title.innerText = 'বিক্রয় অনুমোদন'; break;
                    case 'my-requests': renderMyRequests(container); title.innerText = 'আমার রিকোয়েস্ট লিস্ট'; break;
                    case 'collection': renderCollection(container); title.innerText = 'কিস্তি আদায়'; break;
                    case 'reports': renderReports(container); title.innerText = 'রিপোর্ট ও তালিকা'; break;
                    case 'users': renderUsers(container); title.innerText = 'ইউজার ম্যানেজমেন্ট'; break;
                    case 'settings': renderSettings(container); title.innerText = 'সেটিংস'; break;
                    default: renderDashboard(container);
                }
            }, 50);
        }

        // --- View Renderers ---

        function renderDashboard(container) {
            Object.values(state.chartInstances).forEach(chart => chart.destroy());
            state.chartInstances = {};
            const sales = Object.values(state.sales); 
            const totalSalesCount = sales.length;
            let totalCollection = 0;
            let totalDue = 0;
            let todayCollection = 0;
            const today = new Date(); today.setHours(0,0,0,0);

            sales.forEach(sale => {
                const paid = sale.paidAmount || 0;
                totalCollection += paid;
                totalDue += (sale.totalPayable - paid);
                if(sale.payments) {
                    Object.values(sale.payments).forEach(pay => {
                        if(new Date(pay.date) >= today) todayCollection += pay.amount;
                    });
                }
            });

            container.innerHTML = `
                <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 mb-8">
                    <div class="bg-gradient-to-r from-blue-500 to-blue-600 p-6 rounded-lg shadow-lg text-white transform hover:-translate-y-1 transition">
                        <div class="flex justify-between items-start">
                            <div>
                                <p class="text-blue-100">মোট বিক্রয়</p>
                                <h3 class="text-3xl font-bold mt-1">${totalSalesCount}</h3>
                            </div>
                            <div class="p-3 bg-white bg-opacity-20 rounded-lg"><i class="fas fa-shopping-bag text-2xl"></i></div>
                        </div>
                    </div>
                    <div class="bg-gradient-to-r from-green-500 to-green-600 p-6 rounded-lg shadow-lg text-white transform hover:-translate-y-1 transition">
                        <div class="flex justify-between items-start">
                            <div>
                                <p class="text-green-100">মোট আদায়</p>
                                <h3 class="text-2xl font-bold mt-1">${formatCurrency(totalCollection)}</h3>
                            </div>
                            <div class="p-3 bg-white bg-opacity-20 rounded-lg"><i class="fas fa-wallet text-2xl"></i></div>
                        </div>
                    </div>
                    <div class="bg-gradient-to-r from-red-500 to-red-600 p-6 rounded-lg shadow-lg text-white transform hover:-translate-y-1 transition">
                        <div class="flex justify-between items-start">
                            <div>
                                <p class="text-red-100">মোট বকেয়া</p>
                                <h3 class="text-2xl font-bold mt-1">${formatCurrency(totalDue)}</h3>
                            </div>
                            <div class="p-3 bg-white bg-opacity-20 rounded-lg"><i class="fas fa-exclamation-circle text-2xl"></i></div>
                        </div>
                    </div>
                     <div class="bg-gradient-to-r from-yellow-500 to-yellow-600 p-6 rounded-lg shadow-lg text-white transform hover:-translate-y-1 transition">
                        <div class="flex justify-between items-start">
                            <div>
                                <p class="text-yellow-100">আজকের আদায়</p>
                                <h3 class="text-2xl font-bold mt-1">${formatCurrency(todayCollection)}</h3>
                            </div>
                            <div class="p-3 bg-white bg-opacity-20 rounded-lg"><i class="fas fa-calendar-check text-2xl"></i></div>
                        </div>
                    </div>
                </div>

                <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
                    <div class="bg-white p-6 rounded-lg shadow border border-gray-100">
                        <h4 class="font-bold mb-4 text-gray-700">বিক্রয় ও আদায়</h4>
                        <canvas id="salesChart"></canvas>
                    </div>
                    <div class="bg-white p-6 rounded-lg shadow border border-gray-100">
                        <h4 class="font-bold mb-4 text-gray-700">পেমেন্ট স্ট্যাটাস</h4>
                        <canvas id="statusChart"></canvas>
                    </div>
                </div>
            `;

            setTimeout(() => {
                const ctxSales = document.getElementById('salesChart');
                if(ctxSales) state.chartInstances.sales = new Chart(ctxSales, {
                    type: 'line',
                    data: {
                        labels: ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun'],
                        datasets: [{
                            label: 'Sales', data: [65, 59, 80, 81, 56, 55], borderColor: '#3b82f6', tension: 0.4, fill: false
                        }, {
                            label: 'Collection', data: [28, 48, 40, 19, 86, 27], borderColor: '#10b981', tension: 0.4, fill: false
                        }]
                    }
                });

                const ctxStatus = document.getElementById('statusChart');
                if(ctxStatus) state.chartInstances.status = new Chart(ctxStatus, {
                    type: 'doughnut',
                    data: {
                        labels: ['Paid', 'Due'],
                        datasets: [{ data: [totalCollection, totalDue], backgroundColor: ['#10b981', '#ef4444'] }]
                    }
                });
            }, 100);
        }

        function renderCustomers(container) {
            let html = `

            products.forEach(([id, p]) => {
                // Handle Backward Compatibility: If old format (single object), wrap in array
                const variants = Array.isArray(p.variants) ? p.variants : [{ ram: p.ram || 'N/A', price: p.price || p.cashPrice, stock: p.stock || 0 }];
                const totalStock = variants.reduce((sum, v) => sum + (v.stock || 0), 0);

                html += `
                    <div class="bg-white rounded-xl shadow hover:shadow-xl transition border border-gray-100 overflow-hidden product-card" data-search="${p.name}">
                        <div class="h-48 bg-gray-200 overflow-hidden relative group">
                             <img src="${p.photo || 'https://via.placeholder.com/300'}" class="w-full h-full object-cover group-hover:scale-110 transition duration-500">
                             <div class="absolute top-2 right-2 bg-blue-600 text-white text-xs font-bold px-2 py-1 rounded">স্টক: ${totalStock}</div>

                            <!-- Display Variants -->
                            <div class="text-xs text-gray-600 space-y-1 mb-3">

        function openProductModal(id = null) {
            const p = id ? state.products[id] : {};
            const categories = state.settings.categories || [];
            
            // Handle backward compatibility for existing single-variant products
            let variants = [];
            if(id) {
                if(Array.isArray(p.variants)) {
                    variants = p.variants;
                } else {
                    variants = [{ ram: p.ram || '', price: p.price || p.cashPrice || 0, stock: p.stock || 0 }];
                }
            } else {
                variants = [{ ram: '', price: 0, stock: 0 }]; // Default one row
            }
            
            const modalHtml = `
                <div class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 p-4 backdrop-blur-sm">
                    <div class="bg-white rounded-xl p-6 w-full max-w-2xl shadow-2xl max-h-[90vh] overflow-y-auto">

                        <form id="product-form" class="space-y-4">
                            <input type="hidden" name="id" value="${id || ''}">
                            
                            <div>
                                <label class="block text-sm font-medium text-gray-700">পণ্যের ছবি</label>
                                <input type="file" accept="image/*" onchange="readURL(this, 'prod_photo_input')" class="text-sm text-gray-500 mb-1">
                                <input type="hidden" id="prod_photo_input" name="photo" value="${p.photo || ''}">
                                <img id="prod_photo_preview" src="${p.photo || ''}" class="w-20 h-20 object-cover rounded border hidden mb-2">
                            </div>

                            <input type="text" name="name" placeholder="পণ্যের নাম" value="${p.name || ''}" required class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
                            
                            <div class="grid grid-cols-2 gap-4">
                                <input type="text" name="brand" placeholder="ব্র্যান্ড (e.g. Samsung)" value="${p.brand || ''}" class="w-full px-4 py-2 border rounded">

                            </select>

                            <!-- Variant Rows Container -->
                            <div>
                                <label class="block text-sm font-bold text-gray-700 mb-2">RAM ও দাম (ভ্যারিয়েন্ট)</label>
                                <div id="variants-container" class="space-y-2">
                                    <!-- Rows injected by JS -->
                                </div>
                                <button type="button" onclick="addVariantRow()" class="mt-2 text-sm text-blue-600 hover:underline"><i class="fas fa-plus"></i> আরেকটি ভ্যারিয়েন্ট যোগ করুন</button>
                            </div>

                            <textarea name="features" placeholder="বৈশিষ্ট্য" class="w-full px-4 py-2 border rounded-lg">${p.features || ''}</textarea>
                            <div class="flex justify-end gap-3 mt-6">
                                <button type="button" onclick="document.querySelector('.fixed.bg-black').remove()" class="px-6 py-2 bg-gray-200 rounded-lg hover:bg-gray-300 transition">বাতিল</button>
                                <button type="submit" class="px-6 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition shadow-lg">সংরক্ষণ</button>
                            </div>
                        </form>
                    </div>
                </div>
            `;
            const existingModal = document.querySelector('.fixed.bg-black');
            if(existingModal) existingModal.remove();
            document.body.insertAdjacentHTML('beforeend', modalHtml);

            // Render existing variants
            const container = document.getElementById('variants-container');
            container.innerHTML = '';
            variants.forEach(v => appendVariantRow(v.ram, v.price, v.stock));

            window.addVariantRow = (ram='', price=0, stock=0) => {
                appendVariantRow(ram, price, stock);
            }

            function appendVariantRow(ram='', price=0, stock=0) {
                const div = document.createElement('div');
                div.className = 'flex gap-2 items-center';
                div.innerHTML = `
                    <input type="text" placeholder="RAM (e.g. 4GB)" value="${ram}" class="w-1/3 border p-2 rounded variant-ram text-sm">
                    <input type="number" placeholder="দাম" value="${price}" class="w-1/3 border p-2 rounded variant-price text-sm">
                    <input type="number" placeholder="স্টক" value="${stock}" class="w-1/3 border p-2 rounded variant-stock text-sm">
                    <button type="button" onclick="this.parentElement.remove()" class="text-red-500 hover:bg-red-50 p-2 rounded"><i class="fas fa-times"></i></button>
                `;
                container.appendChild(div);
            }

            document.getElementById('product-form').onsubmit = (e) => {
                e.preventDefault();
                const fd = new FormData(e.target);
                
                // Collect Variants
                const ramInputs = document.querySelectorAll('.variant-ram');
                const priceInputs = document.querySelectorAll('.variant-price');
                const stockInputs = document.querySelectorAll('.variant-stock');
                
                const variantsArr = [];
                for(let i=0; i<ramInputs.length; i++) {
                    if(ramInputs[i].value && priceInputs[i].value) {
                        variantsArr.push({
                            ram: ramInputs[i].value,
                            price: parseFloat(priceInputs[i].value),
                            stock: parseInt(stockInputs[i].value) || 0
                        });
                    }

                const pid = fd.get('id') || db.ref('products').push().key;
                const data = {
                    name: fd.get('name'), brand: fd.get('brand'), model: fd.get('model'),
                    category: fd.get('category'), 
                    variants: variantsArr, // Save array
                    features: fd.get('features'), photo: fd.get('photo')
                };
                db.ref('products/' + pid).set(data).then(() => {
                    document.querySelector('.fixed.bg-black').remove();
                    showToast('পণ্য সংরক্ষিত হয়েছে', 'success');
                }).catch(err => showToast('ত্রুটি: ' + err.message, 'error'));
            };
        }

                            <div class="bg-blue-50 p-4 rounded-lg mb-4 border border-blue-100">

                                    <div>মাসিক কিস্তি: <span id="res-monthly" class="font-bold text-lg text-green-700">0</span></div>

                            <button onclick="submitSaleRequest()" class="w-full bg-blue-600 text-white py-3 rounded-lg font-bold hover:bg-blue-700 shadow-lg transition">অনুরোধ পাঠান (Request)</button>

            document.getElementById('wiz-cust-search').addEventListener('input', (e) => {

                });
            });
            
            document.getElementById('wiz-prod-search').addEventListener('input', (e) => {

                document.querySelectorAll('.product-wiz-card').forEach(card => {
                    card.style.display = card.innerText.toLowerCase().includes(term) ? 'block' : 'none';

        }

        window.selectCustomer = (id) => {
            state.saleDraft.customerId = id;
            document.getElementById('step-1').classList.add('hidden');
            document.getElementById('step-2').classList.remove('hidden');
            document.getElementById('step-ind-2').classList.remove('opacity-50');
            document.getElementById('step-ind-2').querySelector('div').classList.replace('bg-gray-300', 'bg-blue-600');
        };

        window.selectProduct = (id) => {
            const p = state.products[id];
            state.saleDraft.productId = id;
            
            // Check Variants
            let variants = [];
            if(Array.isArray(p.variants)) {
                variants = p.variants;
            } else {
                // Backward compatibility: if single object
                variants = [{ ram: p.ram || '', price: p.price || p.cashPrice || 0, stock: p.stock || 0 }];
            }

            if (variants.length > 1) {
                // Show Variant Selection Modal
                let variantHtml = `
                    <div class="fixed inset-0 bg-black bg-opacity-75 z-50 flex items-center justify-center p-4">
                        <div class="bg-white p-6 rounded-lg max-w-md w-full shadow-xl">
                            <h3 class="font-bold mb-4">RAM ভ্যারিয়েন্ট সিলেক্ট করুন</h3>
                            <div class="space-y-2">
                `;
                variants.forEach((v, idx) => {
                    variantHtml += `
                        <button onclick="finalizeProductSelection(${idx})" class="w-full text-left p-3 border rounded hover:bg-blue-50 flex justify-between">
                            <span class="font-bold">${v.ram}</span>
                            <span class="text-blue-600 font-bold">${formatCurrency(v.price)}</span>
                        </button>
                    `;
                });
                variantHtml += `
                            </div>
                            <button onclick="document.querySelector('.fixed.bg-black').remove()" class="mt-4 w-full bg-gray-200 py-2 rounded">বাতিল</button>
                        </div>
                    </div>
                `;
                const existingModal = document.querySelector('.fixed.bg-black');
                if(existingModal) existingModal.remove();
                document.body.insertAdjacentHTML('beforeend', variantHtml);

                window.finalizeProductSelection = (variantIndex) => {
                    const selected = variants[variantIndex];
                    document.querySelector('.fixed.bg-black').remove();
                    proceedToStep3(selected, variantIndex);
                }
            } else {
                // Only one variant, proceed automatically
                proceedToStep3(variants[0], 0);
            }
        };

        function proceedToStep3(variant, variantIndex) {
            state.saleDraft.selectedVariant = variant;
            state.saleDraft.variantIndex = variantIndex;
            
            document.getElementById('step-2').classList.add('hidden');
            document.getElementById('step-3').classList.remove('hidden');
            document.getElementById('step-ind-3').classList.remove('opacity-50');
            document.getElementById('step-ind-3').querySelector('div').classList.replace('bg-gray-300', 'bg-blue-600');
            
            document.getElementById('selected-prod-name').value = variant.ram;
            document.getElementById('calc-cash').value = variant.price;
            calculateInstallment();
        }

        window.backToStep = (step) => {
            document.getElementById('step-1').classList.add('hidden');
            document.getElementById('step-2').classList.add('hidden');
            document.getElementById('step-3').classList.add('hidden');
            document.getElementById(`step-${step}`).classList.remove('hidden');
        };

        window.applyRatePreset = () => {
            const select = document.getElementById('calc-rate-preset');
            const option = select.options[select.selectedIndex];
            document.getElementById('calc-rate').value = option.dataset.rate || 0;
            document.getElementById('calc-type').value = option.dataset.type || 'flat';
            calculateInstallment();
        }

        function calculateInstallment() {
            const cash = parseFloat(document.getElementById('calc-cash').value) || 0;
            const down = parseFloat(document.getElementById('calc-down').value) || 0;
            let rate = parseFloat(document.getElementById('calc-rate').value) || 0;
            const months = parseFloat(document.getElementById('calc-months').value) || 1;
            const fee = parseFloat(document.getElementById('calc-fee').value) || 0;
            const type = document.getElementById('calc-type').value || 'flat';
            
            const finance = cash - down;
            let interest = 0;
            if (type === 'flat') { interest = finance * (rate / 100); } 
            else { interest = finance * (rate / 100) * months; }

            const totalPayable = finance + interest + fee;
            const monthly = totalPayable / months;

            document.getElementById('res-total').innerText = formatCurrency(totalPayable);
            document.getElementById('res-monthly').innerText = formatCurrency(monthly);
            
            state.saleDraft.calculation = { cash, down, rate, months, fee, totalPayable, monthly };
        }

        function generateSchedule(months, amount) {
            const schedule = {};
            const date = new Date();
            for (let i = 1; i <= months; i++) {
                date.setMonth(date.getMonth() + 1);
                schedule[i] = {
                    dueDate: date.getTime(),
                    amount: amount,
                    status: 'Unpaid',
                    paid: 0
                };
            }
            return schedule;
        }

        function submitSaleRequest() {
            if(!state.saleDraft.customerId || !state.saleDraft.productId) {
                showToast('তথ্য সম্পূর্ণ হয়নি', 'error');
                return;
            }
            const calc = state.saleDraft.calculation;
            const product = state.products[state.saleDraft.productId];
            const schedule = generateSchedule(calc.months, calc.monthly);

            const reqId = db.ref('salesRequests').push().key;
            const request = {
                customerId: state.saleDraft.customerId,
                customerName: state.customers[state.saleDraft.customerId].name,
                productId: state.saleDraft.productId,
                productName: product.name,
                productDetails: { 
                    ram: state.saleDraft.selectedVariant.ram, 
                    brand: product.brand,
                    variantIndex: state.saleDraft.variantIndex // Important for stock reduction
                },
                cashPrice: calc.cash,
                downPayment: calc.down,
                interestRate: calc.rate,
                tenureMonths: calc.months,
                totalPayable: calc.totalPayable,
                monthlyInstallment: calc.monthly,
                schedule: schedule,
                status: 'Pending',
                requestedBy: state.user.username,
                createdAt: Date.now()
            };

            db.ref('salesRequests/' + reqId).set(request).then(() => {
                showToast('রিকোয়েস্ট পাঠানো হয়েছে। অ্যাডমিন অ্যাপ্রুভ করার অপেক্ষা করুন।', 'success');
                state.saleDraft = {}; 
                router('new-request');
            }).catch(e => {
                console.error(e);
                showToast('ত্রুটি: ' + e.message, 'error');
            });
        }

        // 5. Sales Request Approval (Admin)
        function renderSalesRequests(container) {
            const requests = Object.entries(state.salesRequests).filter(([id, r]) => r.status === 'Pending');
            
            let html = `<h2 class="text-xl font-bold mb-4">অপেক্ষমাণ বিক্রয় রিকোয়েস্ট</h2>
            <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">`;

            if(requests.length === 0) html += `<p class="text-gray-500 col-span-2">কোনো রিকোয়েস্ট নেই।</p>`;

            requests.forEach(([id, r]) => {
                html += `
                    <div class="bg-white p-5 rounded-xl shadow border border-gray-100">
                        <div class="flex justify-between items-start mb-4">
                            <div>
                                <h3 class="font-bold text-lg">${r.customerName}</h3>
                                <p class="text-sm text-gray-500">${r.productName} (${r.productDetails?.ram || ''})</p>
                                <p class="text-xs text-gray-400 mt-1">অনুরোধকারী: ${r.requestedBy}</p>
                            </div>
                            <div class="text-right">
                                <span class="text-blue-600 font-bold text-xl block">${formatCurrency(r.totalPayable)}</span>
                                <span class="text-xs text-gray-500">মোট প্রদেয়</span>
                            </div>
                        </div>
                        <div class="flex gap-2">
                            <button onclick="approveRequest('${id}')" class="flex-1 bg-green-600 text-white py-2 rounded hover:bg-green-700 font-bold"><i class="fas fa-check"></i> অ্যাপ্রুভ ও হ্যান্ডওভার</button>
                            <button onclick="rejectRequest('${id}')" class="bg-red-100 text-red-600 px-4 py-2 rounded hover:bg-red-200"><i class="fas fa-times"></i></button>
                        </div>
                    </div>
                `;
            });

            html += `</div>`;
            container.innerHTML = html;
        }

        function approveRequest(reqId) {
            if(!confirm('আপনি কি এই রিকোয়েস্টটি অ্যাপ্রুভ করতে চান? স্টক কমে যাবে এবং কিস্তি শুরু হবে।')) return;

            const req = state.salesRequests[reqId];
            const saleId = db.ref('sales').push().key;

            const sale = {
                ...req,
                saleId: saleId,
                status: 'Active',
                payments: {},
                paidAmount: 0,
                approvedAt: Date.now(),
                approvedBy: state.user.username
            };

            db.ref('sales/' + saleId).set(sale).then(() => {
                // Stock Management based on Variant Index
                if (req.productDetails.variantIndex !== undefined) {
                    const vIndex = req.productDetails.variantIndex;
                    const currentStock = state.products[req.productId].variants[vIndex].stock;
                    if(currentStock > 0) {
                        db.ref('products/' + req.productId + '/variants/' + vIndex + '/stock').set(currentStock - 1);
                    }
                } else {
                    // Fallback for old data without variant index (simple stock)
                    const currentStock = state.products[req.productId].stock;
                    if(currentStock > 0) db.ref('products/' + req.productId + '/stock').set(currentStock - 1);
                }
                
                db.ref('salesRequests/' + reqId).update({ status: 'Approved', saleId: saleId });
                
                showToast('বিক্রয় অ্যাপ্রুভ এবং হ্যান্ডওভার সম্পন্ন!', 'success');
                renderSalesRequests(document.getElementById('view-container'));
            }).catch(e => showToast('ত্রুটি: ' + e.message, 'error'));
        }

        function rejectRequest(reqId) {
            if(confirm('এই রিকোয়েস্টটি বাতিল করতে চান?')) {
                db.ref('salesRequests/' + reqId).update({ status: 'Rejected' }).then(() => {
                    showToast('বাতিল করা হয়েছে', 'success');
                    renderSalesRequests(document.getElementById('view-container'));
                });
            }
        }

        // 6. My Requests (Salesman View)
        function renderMyRequests(container) {

        function openPaymentModal(saleId) {
            const sale = state.sales[saleId];
            const unpaidInstallments = [];
            if(sale.schedule) {
                Object.entries(sale.schedule).forEach(([key, inst]) => {
                    if(inst.status !== 'Paid') unpaidInstallments.push({ ...inst, key: key });
                });
            }

            if(unpaidInstallments.length === 0) return showToast('সব কিস্তি পরিশোধিত', 'success');

            const modalHtml = `
                <div class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 p-4 backdrop-blur-sm">
                    <div class="bg-white rounded-xl p-6 w-full max-w-md shadow-2xl">
                        <h3 class="text-xl font-bold mb-4">কিস্তি আদায়</h3>
                        <form id="payment-form">
                            <div class="mb-4 max-h-40 overflow-y-auto border rounded p-2">
                                ${unpaidInstallments.map(inst => `
                                    <label class="flex items-center justify-between p-2 hover:bg-gray-50 cursor-pointer border-b last:border-0">
                                        <div class="flex items-center gap-2">
                                            <input type="radio" name="installment_key" value="${inst.key}" required onchange="updatePayAmount(this, ${inst.amount - (inst.paid||0)})">
                                            <span class="text-sm">${formatDate(inst.dueDate)}</span>
                                        </div>
                                        <span class="font-bold text-blue-600 text-sm">${formatCurrency(inst.amount - (inst.paid||0))}</span>
                                    </label>
                                `).join('')}
                            </div>
                            <div class="mb-4">
                                <label class="block text-sm font-medium">প্রদেয় টাকা</label>
                                <input type="number" id="pay-amount" class="w-full border p-2 rounded text-lg font-bold" required>
                            </div>
                            <div class="flex justify-end gap-2">
                                <button type="button" onclick="document.querySelector('.fixed.bg-black').remove()" class="px-4 py-2 bg-gray-200 rounded">বাতিল</button>
                                <button type="submit" class="px-4 py-2 bg-green-600 text-white rounded">নিশ্চিত করুন</button>
                            </div>
                        </form>
                    </div>
                </div>
            `;
            
            const existingModal = document.querySelector('.fixed.bg-black');
            if(existingModal) existingModal.remove();
            document.body.insertAdjacentHTML('beforeend', modalHtml);

            window.updatePayAmount = (radio, amount) => document.getElementById('pay-amount').value = amount;

            document.getElementById('payment-form').onsubmit = (e) => {
                e.preventDefault();
                const selectedKey = document.querySelector('input[name="installment_key"]:checked').value;
                const amount = parseFloat(document.getElementById('pay-amount').value);

                const instRef = db.ref('sales/' + saleId + '/schedule/' + selectedKey);
                instRef.transaction((current) => {
                    if(current) {
                        current.paid = (current.paid || 0) + amount;
                        current.status = current.paid >= current.amount ? 'Paid' : 'Partial';
                    }
                    return current;
                });

                const paymentId = db.ref('sales/' + saleId + '/payments').push().key;
                db.ref('sales/' + saleId + '/payments/' + paymentId).set({
                    amount: amount, date: Date.now(), collectedBy: state.user.username
                });

                db.ref('sales/' + saleId + '/paidAmount').set((sale.paidAmount || 0) + amount);

                document.querySelector('.fixed.bg-black').remove();
                showToast('কিস্তি আদায় সফল', 'success');
            };
        }

        // 8. Invoice & Reports
        function generateInvoice(saleId) {
            const sale = state.sales[saleId];
            const customer = state.customers[sale.customerId];
            const settings = state.settings;

            const html = `
                <div class="invoice-box">
                    <div style="display: flex; justify-content: space-between; margin-bottom: 20px; border-bottom: 2px solid #eee; padding-bottom: 20px;">
                        <div>
                            <h1 style="color: #333; font-size: 24px; margin: 0;">${settings.shopName}</h1>
                            <p style="color: #555; margin: 5px 0;">${settings.address}</p>
                            <p style="color: #555; margin: 5px 0;">Mobile: ${settings.mobile}</p>
                        </div>
                        <div style="text-align: right;">
                            <h2 style="color: #333;">INVOICE</h2>
                            <p>Date: ${formatDate(sale.createdAt)}</p>
                            <p>Invoice ID: #${sale.saleId ? sale.saleId.substr(-6).toUpperCase() : 'N/A'}</p>
                        </div>
                    </div>

                    <div style="display: flex; justify-content: space-between; margin-bottom: 30px;">
                        <div>
                            <strong>Bill To:</strong><br>
                            ${customer.name}<br>
                            ${customer.mobile}<br>
                            ${customer.address}
                        </div>
                         <div>
                            <strong>Sold By:</strong><br>
                            ${sale.approvedBy || sale.requestedBy}
                        </div>
                    </div>

                    <table style="width: 100%; border-collapse: collapse; margin-bottom: 20px;">
                        <tr style="background-color: #eee;">
                            <th style="padding: 8px; text-align: left;">Item</th>
                            <th style="padding: 8px; text-align: right;">Price</th>
                        </tr>
                        <tr>
                            <td style="padding: 8px;">${sale.productName} (${sale.selectedVariant?.ram || ''})</td>
                            <td style="padding: 8px; text-align: right;">${formatCurrency(sale.cashPrice)}</td>
                        </tr>
                    </table>

                    <div style="margin-bottom: 30px;">
                        <h3 style="border-bottom: 1px solid #eee; padding-bottom: 5px;">Installment Details</h3>
                        <table style="width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 14px;">
                            <tr style="background-color: #f9f9f9;">
                                <th style="padding: 5px; border: 1px solid #ddd;">Months</th>
                                <th style="padding: 5px; border: 1px solid #ddd;">Interest Rate</th>
                                <th style="padding: 5px; border: 1px solid #ddd;">Total Payable</th>
                                <th style="padding: 5px; border: 1px solid #ddd;">Monthly</th>
                            </tr>
                            <tr>
                                <td style="padding: 5px; border: 1px solid #ddd; text-align: center;">${sale.tenureMonths}</td>
                                <td style="padding: 5px; border: 1px solid #ddd; text-align: center;">${sale.interestRate}%</td>
                                <td style="padding: 5px; border: 1px solid #ddd; text-align: right;">${formatCurrency(sale.totalPayable)}</td>
                                <td style="padding: 5px; border: 1px solid #ddd; text-align: right;">${formatCurrency(sale.monthlyInstallment)}</td>
                            </tr>
                        </table>
                    </div>
                </div>
            `;
            
            const printArea = document.getElementById('print-container');
            printArea.innerHTML = html;
            window.print();
        }

        function generateStatement(customerId) {
            const customer = state.customers[customerId];
            const sales = Object.values(state.sales).filter(s => s.customerId === customerId);
            
            let html = `
                <div class="invoice-box">
                    <h2 style="text-align:center; border-bottom:1px solid #ddd; padding-bottom:10px;">Customer Statement</h2>
                    <p><strong>Name:</strong> ${customer.name}</p>
                    <p><strong>Mobile:</strong> ${customer.mobile}</p>
                    <hr>
                    <table style="width:100%; border-collapse:collapse; margin-top:10px;">
                        <tr style="background:#eee;">
                            <th style="padding:5px; border:1px solid #ddd; text-align:left;">Product</th>
                            <th style="padding:5px; border:1px solid #ddd;">Total</th>
                            <th style="padding:5px; border:1px solid #ddd;">Paid</th>
                            <th style="padding:5px; border:1px solid #ddd;">Due</th>
                        </tr>
            `;

            if(sales.length === 0) {
                html += `<tr><td colspan="4" style="padding:10px; text-align:center;">No Sales Found</td></tr>`;
            } else {
                let grandTotal = 0, grandPaid = 0, grandDue = 0;
                sales.forEach(s => {
                    const due = s.totalPayable - (s.paidAmount || 0);
                    grandTotal += s.totalPayable;
                    grandPaid += (s.paidAmount || 0);
                    grandDue += due;
                    html += `
                        <tr>
                            <td style="padding:5px; border:1px solid #ddd;">${s.productName} (${s.selectedVariant?.ram||''})</td>
                            <td style="padding:5px; border:1px solid #ddd; text-align:right;">${formatCurrency(s.totalPayable)}</td>
                            <td style="padding:5px; border:1px solid #ddd; text-align:right; color:green;">${formatCurrency(s.paidAmount||0)}</td>
                            <td style="padding:5px; border:1px solid #ddd; text-align:right; color:red;">${formatCurrency(due)}</td>
                        </tr>
                    `;
                });
                html += `
                    <tr style="font-weight:bold; background:#f9f9f9;">
                        <td style="padding:5px; border:1px solid #ddd;">Total</td>
                        <td style="padding:5px; border:1px solid #ddd; text-align:right;">${formatCurrency(grandTotal)}</td>
                        <td style="padding:5px; border:1px solid #ddd; text-align:right; color:green;">${formatCurrency(grandPaid)}</td>
                        <td style="padding:5px; border:1px solid #ddd; text-align:right; color:red;">${formatCurrency(grandDue)}</td>
                    </tr>
                `;
            }
            html += `</table></div>`;
            
            const printArea = document.getElementById('print-container');
            printArea.innerHTML = html;
            window.print();
        }

        function renderReports(container) {
            const sales = Object.entries(state.sales);
            let html = `
                <div class="bg-white rounded-lg shadow overflow-hidden">
                    <div class="p-4 border-b flex justify-between items-center bg-gray-50">
                        <h2 class="text-lg font-bold">সকল বিক্রয় তালিকা</h2>
                        <button onclick="printCurrentView()" class="bg-blue-600 text-white px-4 py-2 rounded text-sm hover:bg-blue-700 no-print"><i class="fas fa-print"></i> প্রিন্ট রিপোর্ট</button>
                    </div>
                    <div id="report-table-area" class="overflow-x-auto">
                        <table class="w-full text-left text-sm">
                            <thead class="bg-gray-100 text-gray-600 uppercase font-bold">
                                <tr>
                                    <th class="p-4">তারিখ</th>
                                    <th class="p-4">গ্রাহক</th>
                                    <th class="p-4">পণ্য</th>
                                    <th class="p-4">মোট টাকা</th>
                                    <th class="p-4">পরিশোধিত</th>
                                    <th class="p-4">বকেয়া</th>
                                    <th class="p-4 no-print">অ্যাকশন</th>
                                </tr>
                            </thead>
                            <tbody class="divide-y divide-gray-100">
            `;

            sales.forEach(([id, s]) => {
                const due = s.totalPayable - (s.paidAmount || 0);
                html += `
                    <tr class="hover:bg-gray-50">
                        <td class="p-4">${formatDate(s.createdAt)}</td>
                        <td class="p-4">${s.customerName}</td>
                        <td class="p-4">${s.productName} (${s.selectedVariant?.ram || ''})</td>
                        <td class="p-4 font-bold">${formatCurrency(s.totalPayable)}</td>
                        <td class="p-4 text-green-600 font-bold">${formatCurrency(s.paidAmount)}</td>
                        <td class="p-4 text-red-600 font-bold">${formatCurrency(due)}</td>
                        <td class="p-4 no-print">
                            <button onclick="generateInvoice('${id}')" class="text-blue-600 hover:underline">ইনভয়েস</button>
                        </td>
                    </tr>
                `;
            });

            html += `</tbody></table></div></div>`;
            container.innerHTML = html;
        }

        function printCurrentView() {
            const content = document.getElementById('view-container').innerHTML;
            const printArea = document.getElementById('print-container');
            printArea.innerHTML = `<div class="p-8 bg-white text-black"><h1 class="text-center text-xl font-bold mb-4">Report - ${document.getElementById('page-title').innerText}</h1>${content}</div>`;
            window.print();
        }

        // 9. Settings & User Management
        function renderSettings(container) {
            const rates = state.settings.interestRates || [];
            const categories = state.settings.categories || [];
            
            let html = `
                <div class="max-w-4xl mx-auto space-y-6">
                    <div class="bg-white p-6 rounded-lg shadow">
                        <h3 class="font-bold mb-4">দোকানের তথ্য</h3>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                            <input type="text" id="set-name" value="${state.settings.shopName}" placeholder="দোকানের নাম" class="border p-2 rounded w-full">
                            <input type="text" id="set-mobile" value="${state.settings.mobile}" placeholder="মোবাইল" class="border p-2 rounded w-full">
                            <input type="text" id="set-addr" value="${state.settings.address}" placeholder="ঠিকানা" class="border p-2 rounded w-full md:col-span-2">
                        </div>
                        <button onclick="saveSettings()" class="mt-4 bg-blue-600 text-white px-4 py-2 rounded">সেভ করুন</button>
                    </div>

                    <div class="bg-white p-6 rounded-lg shadow">
                        <div class="flex justify-between items-center mb-4">
                            <h3 class="font-bold">ক্যাটাগরি ম্যানেজমেন্ট</h3>
                            <button onclick="addCategory()" class="bg-green-600 text-white px-3 py-1 rounded text-sm"><i class="fas fa-plus"></i> যোগ করুন</button>
                        </div>
                        <div class="flex flex-wrap gap-2">
                            ${categories.map((c, idx) => `
                                <span class="bg-gray-100 px-3 py-1 rounded-full text-sm flex items-center gap-2">
                                    ${c} <i class="fas fa-times text-red-500 cursor-pointer" onclick="deleteCategory(${idx})"></i>
                                </span>
                            `).join('')}
                        </div>
                    </div>

                    <div class="bg-white p-6 rounded-lg shadow">
                        <div class="flex justify-between items-center mb-4">
                            <h3 class="font-bold">সুদের হার ম্যানেজমেন্ট</h3>
                            <button onclick="addInterestRate()" class="bg-green-600 text-white px-3 py-1 rounded text-sm"><i class="fas fa-plus"></i> যোগ করুন</button>
                        </div>
                        <table class="w-full text-sm">
                            <thead class="bg-gray-100"><tr><th class="p-2">নাম</th><th class="p-2">হার (%)</th><th class="p-2">ধরন</th><th class="p-2">অ্যাকশন</th></tr></thead>
                            <tbody>
                                ${rates.map((r, idx) => `
                                    <tr class="border-b">
                                        <td class="p-2"><input type="text" value="${r.name}" onchange="updateRate(${idx}, 'name', this.value)" class="border-none bg-transparent w-full focus:ring-1"></td>
                                        <td class="p-2"><input type="number" value="${r.rate}" onchange="updateRate(${idx}, 'rate', this.value)" class="border-none bg-transparent w-full focus:ring-1"></td>
                                        <td class="p-2">${r.type}</td>
                                        <td class="p-2 text-red-500 cursor-pointer" onclick="deleteRate(${idx})"><i class="fas fa-trash"></i></td>
                                    </tr>
                                `).join('')}
                            </tbody>
                        </table>
                    </div>
                </div>
            `;
            container.innerHTML = html;
        }

        function saveSettings() {
            const updates = {
                shopName: document.getElementById('set-name').value,
                mobile: document.getElementById('set-mobile').value,
                address: document.getElementById('set-addr').value
            };
            db.ref('settings').update(updates).then(() => showToast('সেটিংস সেভ হয়েছে', 'success'));
        }

        function addCategory() {
            const name = prompt("ক্যাটাগরির নাম লিখুন:");
            if(name) {
                const cats = state.settings.categories || [];
                cats.push(name);
                db.ref('settings/categories').set(cats);
            }
        }

        function deleteCategory(idx) {
            const cats = state.settings.categories;
            cats.splice(idx, 1);
            db.ref('settings/categories').set(cats);
        }

        function addInterestRate() {
            const rates = state.settings.interestRates || [];
            rates.push({ id: Date.now(), name: 'New Rate', rate: 0, type: 'flat' });
            db.ref('settings/interestRates').set(rates);
        }

        function updateRate(idx, field, value) {
            const rates = state.settings.interestRates;
            rates[idx][field] = value;
            db.ref('settings/interestRates').set(rates);
        }

        function deleteRate(idx) {
            const rates = state.settings.interestRates;
            rates.splice(idx, 1);
            db.ref('settings/interestRates').set(rates);
        }

        function renderUsers(container) {
            if(state.user.role !== 'admin') return container.innerHTML = 'Access Denied';
            let html = `
                <div class="bg-white p-6 rounded-lg shadow">
                    <div class="flex justify-between items-center mb-6">
                        <h2 class="text-xl font-bold">ইউজার ম্যানেজমেন্ট</h2>
                        <button onclick="openUserModal()" class="bg-blue-600 text-white px-4 py-2 rounded hover:bg-blue-700"><i class="fas fa-user-plus"></i> নতুন ইউজার</button>
                    </div>
                    <div class="overflow-x-auto">
                        <table class="w-full text-left border-collapse">
                            <thead class="bg-gray-100 border-b">
                                <tr>
                                    <th class="p-3">নাম</th>
                                    <th class="p-3">ইউজারনেম</th>
                                    <th class="p-3">রোল</th>
                                    <th class="p-3 text-right">অ্যাকশন</th>
                                </tr>
                            </thead>
                            <tbody>
            `;

            Object.entries(state.users).forEach(([id, u]) => {
                html += `
                    <tr class="border-b hover:bg-gray-50">
                        <td class="p-3 font-medium">${u.name}</td>
                        <td class="p-3 text-gray-600">${u.username}</td>
                        <td class="p-3"><span class="bg-blue-100 text-blue-800 text-xs px-2 py-1 rounded-full">${u.role}</span></td>
                        <td class="p-3 text-right">
                            ${u.username !== 'KS' ? `
                                <button onclick="openUserModal('${id}')" class="text-blue-500 hover:text-blue-700 mr-2"><i class="fas fa-edit"></i></button>
                                <button onclick="deleteUser('${id}')" class="text-red-500 hover:text-red-700"><i class="fas fa-trash"></i></button>
                            ` : '<span class="text-xs text-gray-400">Super Admin</span>'}
                        </td>
                    </tr>
                `;
            });

            html += `</tbody></table></div></div>`;
            container.innerHTML = html;
        }

        function openUserModal(id = null) {
            const u = id ? state.users[id] : {};
            const modalHtml = `
                <div class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 p-4 backdrop-blur-sm">
                    <div class="bg-white rounded-xl p-6 w-full max-w-md shadow-2xl">
                        <h3 class="text-xl font-bold mb-4">${id ? 'ইউজার এডিট' : 'নতুন ইউজার যুক্ত করুন'}</h3>
                        <form id="user-form" class="space-y-4">
                            <input type="hidden" name="id" value="${id || ''}">
                            <div>
                                <label class="block text-sm font-medium text-gray-700">পুরো নাম</label>
                                <input type="text" name="name" value="${u.name || ''}" required class="w-full border p-2 rounded-lg">
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-gray-700">ইউজারনেম (ID)</label>
                                <input type="text" name="username" value="${u.username || ''}" required ${id ? 'readonly' : ''} class="w-full border p-2 rounded-lg bg-gray-50">
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-gray-700">পাসওয়ার্ড</label>
                                <input type="password" name="password" placeholder="পাসওয়ার্ড লিখুন" ${id ? '' : 'required'} class="w-full border p-2 rounded-lg">
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-gray-700">ভূমিকা (Role)</label>
                                <select name="role" class="w-full border p-2 rounded-lg">
                                    <option value="salesman" ${u.role === 'salesman' ? 'selected' : ''}>Salesman</option>
                                    <option value="manager" ${u.role === 'manager' ? 'selected' : ''}>Manager</option>
                                    <option value="admin" ${u.role === 'admin' ? 'selected' : ''}>Admin</option>
                                </select>
                            </div>
                            <div class="flex justify-end gap-2 mt-4">
                                <button type="button" onclick="document.querySelector('.fixed.bg-black').remove()" class="px-4 py-2 bg-gray-200 rounded">বাতিল</button>
                                <button type="submit" class="px-4 py-2 bg-blue-600 text-white rounded">সংরক্ষণ</button>
                            </div>
                        </form>
                    </div>
                </div>
            `;
            const existingModal = document.querySelector('.fixed.bg-black');
            if(existingModal) existingModal.remove();
            document.body.insertAdjacentHTML('beforeend', modalHtml);

            document.getElementById('user-form').onsubmit = (e) => {
                e.preventDefault();
                const fd = new FormData(e.target);
                const uid = fd.get('id');
                const username = fd.get('username');
                const data = { username: username, name: fd.get('name'), role: fd.get('role') };
                const pass = fd.get('password');
                if(pass) data.password = pass;

                if (uid) {
                    db.ref('users/' + uid).update(data).then(() => {
                        document.querySelector('.fixed.bg-black').remove();
                        showToast('আপডেট সফল', 'success');
                    });
                } else {
                    data.createdAt = Date.now();
                    db.ref('users/' + username).set(data).then(() => {
                        document.querySelector('.fixed.bg-black').remove();
                        showToast('ইউজার তৈরি সফল', 'success');
                    });
                }
            };
        }

        function deleteUser(id) {
            if(confirm('আপনি কি এই ইউজারকে ডিলিট করতে চান?')) {
                db.ref('users/' + id).remove().then(() => showToast('ডিলিট সফল', 'success'));
            }
        }
    </script>
</body>
</html>
