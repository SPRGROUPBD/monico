function buildSearchBox(containerId, items, onSelect, placeholder, iconClass){
  const con=document.getElementById(containerId);if(!con)return;
  con.innerHTML=`<div class="csb"><i class="fas ${iconClass||'fa-search'}"></i><input type="text" class="fi" id="${containerId}_inp" placeholder="${placeholder||'খুঁজুন...'}" autocomplete="off"><div class="csb-dd" id="${containerId}_dd"></div><input type="hidden" id="${containerId}_val"></div>`;
  const inp=document.getElementById(containerId+'_inp');
  const dd=document.getElementById(containerId+'_dd');
  const hdn=document.getElementById(containerId+'_val');
  let hlIdx=-1;
  function render(q){
    const query=(q||'').toLowerCase();
    const filtered=items.filter(it=>{
      const searchStr=(it.label+' '+it.sub||'').toLowerCase();
      return searchStr.includes(query);
    });
    if(!filtered.length){dd.innerHTML='<div class="csb-empty"><i class="fas fa-search mr-1"></i>কিছু পাওয়া যায়নি</div>';dd.classList.add('open');hlIdx=-1;return;}
    hlIdx=-1;
    dd.innerHTML=filtered.map((it,i)=>{
      let imgHtml='';
      if(it.img)imgHtml=`<img src="${it.img}" alt="">`;
      else if(it.icon)imgHtml=`<div class="w-8 h-8 rounded-lg bg-pri-50 flex items-center justify-center flex-shrink-0"><i class="fas ${it.icon} text-pri-600 text-sm"></i></div>`;
      return`<div class="csb-item" data-idx="${i}" data-id="${it.id}" onmousedown="event.preventDefault();document.getElementById('${containerId}_inp').value='${it.label.replace(/'/g,"\\'")}';document.getElementById('${containerId}_val').value='${it.id}';document.getElementById('${containerId}_dd').classList.remove('open');(${onSelect.name||'function(){}'})('${it.id}');">${imgHtml}<div><div class="font-medium">${it.label}</div>${it.sub?`<div class="sub">${it.sub}</div>`:''}</div></div>`;
    }).join('');
    dd.classList.add('open');
  }
  inp.addEventListener('focus',()=>{if(!hdn.value)render(inp.value);});
  inp.addEventListener('input',()=>{hdn.value='';render(inp.value);});
  inp.addEventListener('keydown',e=>{
    const items=dd.querySelectorAll('.csb-item');if(!items.length)return;
    if(e.key==='ArrowDown'){e.preventDefault();hlIdx=Math.min(hlIdx+1,items.length-1);items.forEach((it,i)=>it.classList.toggle('hl',i===hlIdx));items[hlIdx]?.scrollIntoView({block:'nearest'});}
    else if(e.key==='ArrowUp'){e.preventDefault();hlIdx=Math.max(hlIdx-1,0);items.forEach((it,i)=>it.classList.toggle('hl',i===hlIdx));items[hlIdx]?.scrollIntoView({block:'nearest'});}
    else if(e.key==='Enter'&&hlIdx>=0){e.preventDefault();items[hlIdx]?.dispatchEvent(new MouseEvent('mousedown'));}
    else if(e.key==='Escape'){dd.classList.remove('open');}
  });
  document.addEventListener('click',e=>{if(!con.contains(e.target))dd.classList.remove('open');});
  return{setVal:(id,label)=>{inp.value=label||'';hdn.value=id||'';dd.classList.remove('open');},getVal:()=>hdn.value,getInput:()=>inp,clear:()=>{inp.value='';hdn.value='';}};
}

  return`<div class="slip"><h2>${S.settings.shopName||'কিস্তি বিক্রয়'}</h2><div class="sub">${S.settings.shopAddress||''} | ${S.settings.shopPhone||''}</div><div class="line"></div><p style="text-align:center;font-weight:bold;font-size:13px">কিস্তি আদায় রিসিপ্ট</p><table><tr><td>রিসিপ্ট নং</td><td style="text-align:right;font-weight:bold">${payment.receiptNo}</td></tr><tr><td>তারিখ</td><td style="text-align:right">${fd(payment.date)}</td></tr><tr><td>চালান নং</td><td style="text-align:right">${sale.invoiceNo}</td></tr><tr><td>কাস্টমার</td><td style="text-align:right;font-weight:bold">${payment.customerName||c?c.name:'—'}</td></tr><tr><td>মোবাইল</td><td style="text-align:right">${c?c.mobile:'—'}</td></tr></table><div class="line"></div><table><tr><td>কিস্তি নং</td><td style="text-align:right">${(payment.installmentNos||[]).join(', ')}</td></tr><tr class="total"><td>পরিশোধ্য পরিমাণ</td><td style="text-align:right">${fc(payment.amount)}</td></tr></table><div class="line"></div><table><tr><td>আদায়কারী</td><td style="text-align:right">${payment.collectorName||'—'}</td></tr></table><div class="line"></div><div class="footer">ধন্যবাদ!<br>স্বাক্ষর: ________________</div></div>`;
}

/* ===== ড্যাশবোর্ড ===== */
let chS=null,chD=null;
function rDash(){
  const el=document.getElementById('pgDash'),t=td();let tS=0,tC=0,tD=0,tCo=0;const oC=new Set();const mySales=Object.values(S.sales);
  mySales.forEach(s=>{if(s.status==='rejected')return;tS+=s.cashPrice||0;tC+=s.downPayment||0;(s.schedule||[]).forEach(i=>{if(i.status==='paid')tC+=i.paidAmount||0;else{tD+=i.amount-(i.paidAmount||0);if(s.status==='handed_over'&&new Date(i.dueDate)<new Date(t))oC.add(s.customerId);}});});
  Object.values(S.payments).forEach(p=>{if(p.date===t)tCo+=p.amount||0;});
  el.innerHTML=`<div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-5 gap-4 mb-6"><div class="sc"><div class="w-11 h-11 rounded-xl bg-pri-50 flex items-center justify-center mb-3"><i class="fas fa-chart-line text-pri-600"></i></div><p class="text-2xl font-extrabold">${fc(tS)}</p><p class="text-sm text-gray-500 mt-1">মোট বিক্রয়</p></div><div class="sc"><div class="w-11 h-11 rounded-xl bg-emerald-50 flex items-center justify-center mb-3"><i class="fas fa-check-circle text-emerald-600"></i></div><p class="text-2xl font-extrabold text-emerald-700">${fc(tC)}</p><p class="text-sm text-gray-500 mt-1">মোট আদায়</p></div><div class="sc"><div class="w-11 h-11 rounded-xl bg-red-50 flex items-center justify-center mb-3"><i class="fas fa-exclamation-circle text-red-500"></i></div><p class="text-2xl font-extrabold text-red-600">${fc(tD)}</p><p class="text-sm text-gray-500 mt-1">মোট বকেয়া</p></div><div class="sc"><div class="w-11 h-11 rounded-xl bg-amber-50 flex items-center justify-center mb-3"><i class="fas fa-calendar-day text-amber-600"></i></div><p class="text-2xl font-extrabold text-amber-700">${fc(tCo)}</p><p class="text-sm text-gray-500 mt-1">আজকের সংগ্রহ</p></div><div class="sc"><div class="w-11 h-11 rounded-xl bg-orange-50 flex items-center justify-center mb-3"><i class="fas fa-user-clock text-orange-500"></i></div><p class="text-2xl font-extrabold text-orange-600">${oC.size}</p><p class="text-sm text-gray-500 mt-1">বকেয়া কাস্টমার</p></div></div><div class="grid grid-cols-1 lg:grid-cols-3 gap-5 mb-6"><div class="dc lg:col-span-2 p-5"><h3 class="font-bold text-gray-700 mb-4"><i class="fas fa-chart-bar text-pri-500 mr-2"></i>মাসিক বিক্রয়</h3><div style="height:220px"><canvas id="chS"></canvas></div></div><div class="dc p-5"><h3 class="font-bold text-gray-700 mb-4"><i class="fas fa-chart-doughnut text-amber-500 mr-2"></i>কিস্তির অবস্থা</h3><div style="height:220px"><canvas id="chD"></canvas></div></div></div><div class="grid grid-cols-1 lg:grid-cols-2 gap-5"><div class="dc"><div class="px-5 pt-5 pb-3"><h3 class="font-bold text-gray-700"><i class="fas fa-clock text-red-400 mr-2"></i>সাম্প্রতিক বকেয়া</h3></div><div class="overflow-x-auto"><table class="dt"><thead><tr><th>কাস্টমার</th><th>পণ্য</th><th>বকেয়া</th></tr></thead><tbody id="tO"></tbody></table></div></div><div class="dc"><div class="px-5 pt-5 pb-3"><h3 class="font-bold text-gray-700"><i class="fas fa-history text-pri-400 mr-2"></i>সাম্প্রতিক পেমেন্ট</h3></div><div class="overflow-x-auto"><table class="dt"><thead><tr><th>তারিখ</th><th>কাস্টমার</th><th>পরিমাণ</th><th>আদায়কারী</th></tr></thead><tbody id="tP"></tbody></table></div></div></div>`;
  let oh='';Object.values(S.sales).filter(s=>s.status==='handed_over').forEach(s=>{const c=S.customers[s.customerId],p=S.products[s.productId];if(!c||!p||!s.schedule)return;const oi=s.schedule.filter(i=>i.status!=='paid'&&new Date(i.dueDate)<new Date(t));if(!oi.length)return;oh+=`<tr><td class="font-medium">${c.name}</td><td>${p.name}</td><td class="font-bold text-red-600">${fc(oi.reduce((a,i)=>a+i.amount-(i.paidAmount||0),0))}</td></tr>`;});
  document.getElementById('tO').innerHTML=oh||'<tr><td colspan="3" class="empty-state"><i class="fas fa-check-circle block"></i><p>কোনো বকেয়া নেই</p></td></tr>';
  const rp=Object.values(S.payments).sort((a,b)=>new Date(b.createdAt||b.date)-new Date(a.createdAt||a.date)).slice(0,8);let ph='';rp.forEach(p=>{const cN=p.customerName||S.customers[p.customerId]?.name||'—';ph+=`<tr><td>${fd(p.date)}</td><td class="font-medium">${cN}</td><td class="font-bold text-emerald-600">${fc(p.amount)}</td><td class="text-sm">${p.collectorName||'—'}</td></tr>`;});
  document.getElementById('tP').innerHTML=ph||'<tr><td colspan="4" class="empty-state"><i class="fas fa-receipt block"></i><p>কোনো পেমেন্ট নেই</p></td></tr>';
  if(chS)chS.destroy();if(chD)chD.destroy();
  const ml=[],md=[];for(let i=5;i>=0;i--){const d=new Date();d.setMonth(d.getMonth()-i);const ym=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0');ml.push(mn(d.getMonth()));let x=0;mySales.forEach(s=>{if(s.createdAt&&s.createdAt.startsWith(ym)&&s.status!=='rejected')x+=s.cashPrice||0;});md.push(x);}
  const ctxS=document.getElementById('chS');if(ctxS)chS=new Chart(ctxS,{type:'bar',data:{labels:ml,datasets:[{data:md,backgroundColor:'rgba(13,148,136,.7)',borderRadius:8,borderSkipped:false}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{y:{beginAtZero:true,ticks:{callback:v=>'৳'+(v/1000)+'k'}},x:{grid:{display:false}}}}});
  let pc=0,pu=0,po=0;mySales.forEach(s=>{if(s.status==='rejected'||!s.schedule)return;(s.schedule||[]).forEach(i=>{if(i.status==='paid')pc++;else if(s.status==='handed_over'&&new Date(i.dueDate)<new Date(t))po++;else pu++;});});
  const ctxD=document.getElementById('chD');if(ctxD)chD=new Chart(ctxD,{type:'doughnut',data:{labels:['পরিশোধিত','অপেক্ষমান','বকেয়া'],datasets:[{data:[pc,pu,po],backgroundColor:['#059669','#d97706','#dc2626'],borderWidth:0,spacing:3}]},options:{responsive:true,maintainAspectRatio:false,cutout:'65%',plugins:{legend:{position:'bottom',labels:{padding:14,usePointStyle:true,pointStyleWidth:10,font:{family:'Noto Sans Bengali',size:12}}}}}});
}

/* ===== কাস্টমার ===== */
function rCust(){const el=document.getElementById('pgCust'),cs=Object.entries(S.customers);el.innerHTML=`<div class="flex flex-col sm:flex-row items-start sm:items-center justify-between gap-3 mb-5"><div class="sbx w-full sm:w-72"><i class="fas fa-search"></i><input type="text" id="cSrch" class="fi text-sm" placeholder="নাম বা মোবাইল..." oninput="fCu(this.value)"></div><button class="btn bP" onclick="sCF()"><i class="fas fa-plus"></i>নতুন কাস্টমার</button></div><div class="dc overflow-x-auto"><table class="dt"><thead><tr><th>ছবি</th><th>নাম</th><th>মোবাইল</th><th>ঠিকানা</th><th>NID</th><th>গ্যারান্টর</th><th>অ্যাকশন</th></tr></thead><tbody id="cTB"></tbody></table></div><p class="text-sm text-gray-400 mt-3">মোট: ${cs.length} জন</p>`;dCR(cs);}
function dCR(cs){const tb=document.getElementById('cTB');if(!tb)return;if(!cs.length){tb.innerHTML='<tr><td colspan="7" class="empty-state"><i class="fas fa-users block"></i><p>কোনো কাস্টমার নেই</p></td></tr>';return;}tb.innerHTML=cs.map(([id,c])=>`<tr><td>${c.photo?`<img src="${c.photo}" class="pp">`:'<div class="pub" style="cursor:default"><i class="fas fa-user"></i></div>'}</td><td class="font-semibold">${c.name}</td><td>${c.mobile}</td><td class="text-sm text-gray-500">${c.address||'—'}</td><td>${c.nid||'—'}</td><td class="text-sm">${c.guarantor&&c.guarantor.name?c.guarantor.name:'—'}</td><td><div class="flex gap-1"><button class="btn bXS bO" onclick="sCF('${id}')"><i class="fas fa-edit"></i></button><button class="btn bXS bX" onclick="dCu('${id}')"><i class="fas fa-trash"></i></button></div></td></tr>`).join('');}
function fCu(q){q=q.toLowerCase();dCR(Object.entries(S.customers).filter(([,c])=>c.name.toLowerCase().includes(q)||c.mobile.includes(q)));}
function sCF(eid){const c=eid?S.customers[eid]:{name:'',mobile:'',address:'',nid:'',photo:'',guarantor:{name:'',mobile:'',address:'',nid:''}};const g=c.guarantor||{};openM(`<div class="mh"><h3 class="font-bold text-lg">${eid?'সম্পাদনা':'নতুন কাস্টমার'}</h3><button onclick="clM()" class="text-gray-400 hover:text-gray-600 text-xl"><i class="fas fa-times"></i></button></div><div class="mbd"><div class="flex items-center gap-4 mb-5"><div class="pub" id="cpB" onclick="document.getElementById('cpI').click()">${c.photo?`<img src="${c.photo}" class="pp">`:'<i class="fas fa-camera text-xl"></i>'}</div><div><p class="text-sm font-medium">ছবি</p><p class="text-xs text-gray-400">ক্লিক করুন</p></div><input type="file" id="cpI" accept="image/*" class="hidden" onchange="hPU(this,'cpB','cpV')"></div><input type="hidden" id="cpV" value="${c.photo||''}"><input type="hidden" id="cE" value="${eid||''}"><div class="grid grid-cols-1 sm:grid-cols-2 gap-4"><div class="fg"><label class="fl">নাম *</label><input type="text" id="cN" class="fi" value="${c.name}"></div><div class="fg"><label class="fl">মোবাইল *</label><input type="text" id="cM" class="fi" value="${c.mobile}"></div><div class="fg"><label class="fl">ঠিকানা</label><input type="text" id="cA" class="fi" value="${c.address||''}"></div><div class="fg"><label class="fl">NID</label><input type="text" id="cNI" class="fi" value="${c.nid||''}"></div></div><div class="mt-4 p-4 bg-slate-50 rounded-xl"><h4 class="font-bold text-sm text-gray-600 mb-3"><i class="fas fa-user-shield text-pri-500 mr-2"></i>গ্যারান্টর</h4><div class="grid grid-cols-1 sm:grid-cols-2 gap-4"><div class="fg"><label class="fl">নাম</label><input type="text" id="gN" class="fi" value="${g.name||''}"></div><div class="fg"><label class="fl">মোবাইল</label><input type="text" id="gM" class="fi" value="${g.mobile||''}"></div><div class="fg"><label class="fl">ঠিকানা</label><input type="text" id="gA" class="fi" value="${g.address||''}"></div><div class="fg"><label class="fl">NID</label><input type="text" id="gNI" class="fi" value="${g.nid||''}"></div></div></div></div><div class="mf"><button onclick="clM()" class="btn bO">বাতিল</button><button onclick="svCu()" class="btn bP"><i class="fas fa-save"></i>${eid?'আপডেট':'সংরক্ষণ'}</button></div>`);}
function hPU(inp,bId,vId){const f=inp.files[0];if(!f)return;if(f.size>500000){toast('৫০০KB এর কম হতে হবে','warning');return;}const r=new FileReader();r.onload=e=>{document.getElementById(vId).value=e.target.result;document.getElementById(bId).innerHTML=`<img src="${e.target.result}" class="pp">`;};r.readAsDataURL(f);}
async function svCu(){const n=document.getElementById('cN').value.trim(),m=document.getElementById('cM').value.trim();if(!n||!m){toast('নাম ও মোবাইল দিন','warning');return;}const d={name:n,mobile:m,address:document.getElementById('cA').value.trim(),nid:document.getElementById('cNI').value.trim(),photo:document.getElementById('cpV').value,guarantor:{name:document.getElementById('gN').value.trim(),mobile:document.getElementById('gM').value.trim(),address:document.getElementById('gA').value.trim(),nid:document.getElementById('gNI').value.trim()},createdAt:document.getElementById('cE').value?(S.customers[document.getElementById('cE').value]?.createdAt||td()):td()};const eid=document.getElementById('cE').value;if(eid){await DB.update('customers/'+eid,d);S.customers[eid]=d;toast('আপডেট হয়েছে');}else{const id=await DB.push('customers',d);if(id)S.customers[id]=d;toast('যোগ হয়েছে');}clM();rCust();}
async function dCu(id){const c=S.customers[id];if(!c)return;if(Object.values(S.sales).some(s=>s.customerId===id&&s.status!=='rejected'&&s.status!=='completed')){toast('সক্রিয় বিক্রয় আছে','error');return;}openM(`<div class="mh"><h3 class="font-bold text-lg text-red-600"><i class="fas fa-exclamation-triangle mr-2"></i>মুছুন</h3><button onclick="clM()" class="text-gray-400 hover:text-gray-600 text-xl"><i class="fas fa-times"></i></button></div><div class="mbd"><p><strong>${c.name}</strong> মুছে ফেলতে চান?</p></div><div class="mf"><button onclick="clM()" class="btn bO">না</button><button onclick="confirmDelC('${id}')" class="btn bX"><i class="fas fa-trash"></i>হ্যাঁ</button></div>`);}
async function confirmDelC(id){await DB.remove('customers/'+id);delete S.customers[id];clM();toast('মুছে ফেলা হয়েছে');rCust();}

/* ===== পণ্য (ছবি সহ) ===== */
function rProd(){const el=document.getElementById('pgProd'),ps=Object.entries(S.products);const cats=[...new Set(ps.map(([,p])=>p.category))];el.innerHTML=`<div class="flex flex-col sm:flex-row items-start sm:items-center justify-between gap-3 mb-5"><div class="flex gap-2 flex-wrap"><button class="tb act" onclick="fPr('all',this)">সব</button>${cats.map(c=>`<button class="tb" onclick="fPr('${c}',this)">${c}</button>`).join('')}</div><button class="btn bP" onclick="sPF()"><i class="fas fa-plus"></i>নতুন পণ্য</button></div><div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4" id="pG"></div><p class="text-sm text-gray-400 mt-3">মোট: ${ps.length} টি</p>`;dPC(ps);}
function dPC(ps){const g=document.getElementById('pG');if(!g)return;if(!ps.length){g.innerHTML='<div class="col-span-full empty-state"><i class="fas fa-box-open block"></i><p>কোনো পণ্য নেই</p></div>';return;}const ci={'মোবাইল':'fa-mobile-alt','ইলেকট্রনিক্স':'fa-tv','ফার্নিচার':'fa-couch','গৃহস্থালী':'fa-blender'};g.innerHTML=ps.map(([id,p])=>{const ic=ci[p.category]||'fa-box';const sc=p.stock>5?'bS':p.stock>0?'bW':'bD';return`<div class="dc overflow-hidden hover:shadow-lg transition-all">${p.image?`<div class="h-36 bg-slate-100 flex items-center justify-center"><img src="${p.image}" class="h-full w-full object-contain p-2"></div>`:`<div class="h-24 bg-gradient-to-br from-slate-50 to-slate-100 flex items-center justify-center"><i class="fas ${ic} text-3xl text-slate-300"></i></div>`}<div class="p-5"><div class="flex items-start justify-between mb-2"><h4 class="font-bold text-gray-800">${p.name}</h4><span class="b ${sc}">${p.stock} পিস</span></div><p class="text-xs text-gray-400 mb-3">${p.category}</p><div class="flex justify-between items-end"><div><p class="text-xs text-gray-400">ক্রয়</p><p class="font-semibold text-gray-600">${fc(p.purchasePrice)}</p></div><div class="text-right"><p class="text-xs text-gray-400">বিক্রয়</p><p class="font-bold text-pri-600">${fc(p.cashPrice)}</p></div></div><div class="flex gap-1 mt-4 pt-3 border-t border-slate-100"><button class="btn bXS bO flex-1" onclick="sPF('${id}')"><i class="fas fa-edit"></i> সম্পাদনা</button><button class="btn bXS bX" onclick="dPr('${id}')"><i class="fas fa-trash"></i></button></div></div></div>`;}).join('');}
function fPr(cat,btn){document.querySelectorAll('.tb').forEach(b=>b.classList.remove('act'));if(btn)btn.classList.add('act');dPC(cat==='all'?Object.entries(S.products):Object.entries(S.products).filter(([,p])=>p.category===cat));}
function sPF(eid){
  const p=eid?S.products[eid]:{name:'',category:'মোবাইল',purchasePrice:'',cashPrice:'',stock:0,image:''};
  openM(`<div class="mh"><h3 class="font-bold text-lg">${eid?'সম্পাদনা':'নতুন পণ্য'}</h3><button onclick="clM()" class="text-gray-400 hover:text-gray-600 text-xl"><i class="fas fa-times"></i></button></div><div class="mbd"><input type="hidden" id="pE" value="${eid||''}"><div class="flex items-center gap-4 mb-5"><div class="pub" id="ppB" onclick="document.getElementById('ppI').click()" style="width:80px;height:80px;border-radius:12px">${p.image?`<img src="${p.image}" style="width:80px;height:80px;border-radius:12px;object-fit:cover">`:'<i class="fas fa-camera text-2xl"></i>'}</div><div><p class="text-sm font-medium">পণ্যের ছবি</p><p class="text-xs text-gray-400">ক্লিক করে আপলোড করুন</p></div><input type="file" id="ppI" accept="image/*" class="hidden" onchange="hPPU(this)"></div><input type="hidden" id="ppV" value="${p.image||''}"><div class="fg"><label class="fl">নাম *</label><input type="text" id="pN" class="fi" value="${p.name}"></div><div class="fg"><label class="fl">ক্যাটাগরি *</label><select id="pC" class="fi"><option ${p.category==='মোবাইল'?'selected':''}>মোবাইল</option><option ${p.category==='ইলেকট্রনিক্স'?'selected':''}>ইলেকট্রনিক্স</option><option ${p.category==='ফার্নিচার'?'selected':''}>ফার্নিচার</option><option ${p.category==='গৃহস্থালী'?'selected':''}>গৃহস্থালী</option></select></div><div class="grid grid-cols-2 gap-4"><div class="fg"><label class="fl">ক্রয় মূল্য *</label><input type="number" id="pPu" class="fi" value="${p.purchasePrice}"></div><div class="fg"><label class="fl">নগদ বিক্রয় *</label><input type="number" id="pCa" class="fi" value="${p.cashPrice}"></div></div><div class="fg"><label class="fl">স্টক</label><input type="number" id="pSt" class="fi" value="${p.stock}"></div></div><div class="mf"><button onclick="clM()" class="btn bO">বাতিল</button><button onclick="svPr()" class="btn bP"><i class="fas fa-save"></i>${eid?'আপডেট':'সংরক্ষণ'}</button></div>`);
}
function hPPU(inp){const f=inp.files[0];if(!f)return;if(f.size>500000){toast('৫০০KB এর কম হতে হবে','warning');return;}const r=new FileReader();r.onload=e=>{document.getElementById('ppV').value=e.target.result;document.getElementById('ppB').innerHTML=`<img src="${e.target.result}" style="width:80px;height:80px;border-radius:12px;object-fit:cover">`;};r.readAsDataURL(f);}

/* ===== নতুন বিক্রয় (সার্চেবল কাস্টমার ও পণ্য) ===== */
let _csbCustomer=null, _csbProduct=null, _selectedCP=0;
function rNS(){
  const el=document.getElementById('pgNewSale');
  const hasC=Object.keys(S.customers).length>0,hasP=Object.values(S.products).some(p=>p.stock>0);
  const defRate=S.settings.defaultInterestPerThousand||300;
  el.innerHTML=`<div class="dc max-w-4xl mx-auto"><div class="p-5 border-b border-slate-100"><h3 class="font-bold text-lg text-gray-800"><i class="fas fa-cart-plus text-pri-500 mr-2"></i>নতুন কিস্তি বিক্রয়</h3></div><div class="p-6">${!hasC||!hasP?'<div class="empty-state"><i class="fas fa-exclamation-triangle block"></i><p>প্রথমে কাস্টমার ও পণ্য (স্টকসহ) যোগ করুন</p></div>':`<div class="grid grid-cols-1 md:grid-cols-2 gap-5 mb-6"><div><label class="fl">কাস্টমার খুঁজুন *</label><div id="csbCust"></div></div><div><label class="fl">পণ্য খুঁজুন *</label><div id="csbProd"></div></div></div><div id="sCA" class="hidden"><div class="bg-amber-50 border border-amber-200 rounded-xl p-4 mb-4 text-sm text-amber-700"><i class="fas fa-info-circle mr-1"></i> সুদ = অর্থায়ন × (রেট ÷ ১,০০০) — মাসের সাথে সম্পর্ক নেই</div><div id="prodPreview" class="flex items-center gap-4 bg-slate-50 rounded-xl p-4 mb-4"></div><div class="bg-slate-50 rounded-xl p-5 mb-6"><div class="grid grid-cols-2 md:grid-cols-3 gap-4 mb-4"><div><p class="text-xs text-gray-400">নগদ মূল্য</p><p class="font-bold text-lg" id="dCP">—</p></div><div class="fg mb-0"><label class="fl">ডাউন পেমেন্ট</label><input type="number" id="sD" class="fi" value="0" min="0" oninput="cI()"></div><div class="fg mb-0"><label class="fl">প্রতি ১,০০০-এ সুদ (টাকা)</label><input type="number" id="sR" class="fi" value="${defRate}" oninput="cI()"></div></div><div class="h-px bg-slate-200 my-4"></div><div class="grid grid-cols-3 gap-4"><div><p class="text-xs text-gray-400">অর্থায়ন</p><p class="font-semibold" id="dFn">—</p></div><div><p class="text-xs text-gray-400">মোট সুদ</p><p class="font-semibold text-amber-600" id="dIn">—</p></div><div><p class="text-xs text-gray-400">মোট পরিশোধ্য</p><p class="font-bold text-pri-600" id="dTt">—</p></div></div><div class="fg mt-3"><label class="fl">কিস্তি সংখ্যা</label><input type="number" id="sMs" class="fi" value="${S.settings.defaultInstallmentMonths}" min="1" max="36" oninput="cI()"><p class="text-xs text-gray-400 mt-1">মাসিক কিস্তি: <strong id="dMn">—</strong></p></div></div><div class="fg"><label class="fl">নোট</label><textarea id="sNt" class="fi" rows="2" placeholder="ঐচ্ছিক..."></textarea></div><button onclick="submitSale()" class="btn bP w-full justify-center py-3 text-base"><i class="fas fa-paper-plane"></i>জমা দিন ও স্লিপ প্রিন্ট</button></div>`}</div></div>`;
  /* সার্চেবল কাস্টমার বক্স তৈরি */
  const custItems=Object.entries(S.customers).map(([id,c])=>({id,label:c.name,sub:c.mobile,img:c.photo||null}));
  _csbCustomer=buildSearchBox('csbCust',custItems,function(selId){},'নাম বা মোবাইল লিখুন...','fa-user');
  /* সার্চেবল পণ্য বক্স তৈরি */
  const prodItems=Object.entries(S.products).filter(([,p])=>p.stock>0).map(([id,p])=>({id,label:p.name,sub:fc(p.cashPrice)+' — স্টক: '+p.stock,img:p.image||null,icon:p.image?null:'fa-box'}));
  _csbProduct=buildSearchBox('csbProd',prodItems,onProdSelect,'পণ্যের নাম লিখুন...','fa-box-open');
  _selectedCP=0;
}
function onProdSelect(prodId){
  const p=S.products[prodId];if(!p)return;
  _selectedCP=p.cashPrice;
  document.getElementById('sCA').classList.remove('hidden');
  /* পণ্য প্রিভিউ */
  const prev=document.getElementById('prodPreview');
  prev.innerHTML=p.image?`<img src="${p.image}" class="w-16 h-16 rounded-xl object-cover border-2 border-slate-200">`:`<div class="w-16 h-16 rounded-xl bg-pri-50 flex items-center justify-center"><i class="fas fa-box text-pri-500 text-xl"></i></div>`;
  prev.innerHTML+=`<div><p class="font-bold text-gray-800">${p.name}</p><p class="text-sm text-gray-500">${p.category} — স্টক: ${p.stock}</p><p class="font-bold text-pri-600">${fc(p.cashPrice)}</p></div>`;
  document.getElementById('dCP').textContent=fc(p.cashPrice);
  cI();
}
function cI(){
  const cp=_selectedCP;if(!cp){return;}
  const dp=parseInt(document.getElementById('sD')?.value)||0;
  const ratePerK=parseFloat(document.getElementById('sR')?.value)||0;
  const months=parseInt(document.getElementById('sMs')?.value)||1;
  if(dp>cp){const sd=document.getElementById('sD');if(sd)sd.value=cp;return cI();}
  const fin=cp-dp;const interest=Math.round(fin*(ratePerK/1000));const total=fin+interest;const monthly=months>0?Math.ceil(total/months):0;
  document.getElementById('dFn').textContent=fc(fin);document.getElementById('dIn').textContent=fc(interest);
  document.getElementById('dTt').textContent=fc(total);document.getElementById('dMn').textContent=fc(monthly);
}
async function submitSale(){
  const cid=_csbCustomer?_csbCustomer.getVal():'',pid=_csbProduct?_csbProduct.getVal():'';
  if(!cid||!pid){toast('কাস্টমার ও পণ্য নির্বাচন করুন','warning');return;}
  const prod=S.products[pid];if(!prod){toast('পণ্য পাওয়া যায়নি','error');return;}
  const cp=prod.cashPrice,dp=parseInt(document.getElementById('sD').value)||0;
  if(dp>cp){toast('ডাউন পেমেন্ট বেশি হতে পারে না','warning');return;}
  const ratePerK=parseFloat(document.getElementById('sR').value)||0;
  const months=parseInt(document.getElementById('sMs').value)||1;
  const fin=cp-dp,interest=Math.round(fin*(ratePerK/1000)),total=fin+interest,monthly=Math.ceil(total/months);
  const schedule=[];const now=new Date();
  for(let i=1;i<=months;i++){const due=new Date(now.getFullYear(),now.getMonth()+i,now.getDate());let amt=monthly;if(i===months)amt=total-(monthly*(months-1));schedule.push({installmentNo:i,dueDate:due.toISOString().split('T')[0],amount:amt,paidAmount:0,status:'pending',paidDate:null});}
  const sale={invoiceNo:genInvNo(),customerId:cid,productId:pid,cashPrice:cp,downPayment:dp,financingAmount:fin,interestRate:ratePerK,totalInterest:interest,totalPayable:total,monthlyInstallment:monthly,totalInstallments:months,schedule:schedule,note:document.getElementById('sNt').value.trim(),status:'pending',createdBy:S.user.uid,createdAt:new Date().toISOString()};
  try{
    const id=await DB.push('sales',sale);if(id)S.sales[id]=sale;
    toast('বিক্রয় অনুরোধ জমা হয়েছে');
    /* স্লিপ প্রিন্ট */
    printSlip(buildSaleSlip(sale));
    go('saleReq');
  }catch(e){toast('সংরক্ষণ ব্যর্থ: '+e.message,'error');}
}

</div></div></div>`;});html+='</div>';el.innerHTML+=html;}
async function approveSale(id){const s=S.sales[id];if(!s)return;openM(`<div class="mh"><h3 class="font-bold text-lg text-emerald-600"><i class="fas fa-check-circle mr-2"></i>অনুমোদন</h3><button onclick="clM()" class="text-gray-400 hover:text-gray-600 text-xl"><i class="fas fa-times"></i></button></div><div class="mbd"><p class="mb-3">${s.invoiceNo} অনুমোদন করতে চান?</p><div class="bg-slate-50 rounded-xl p-4 text-sm"><p>পণ্য: <strong>${S.products[s.productId]?.name||'—'}</strong></p><p>পরিশোধ্য: <strong class="text-pri-600">${fc(s.totalPayable)}</strong> (${s.totalInstallments} কিস্তি)</p></div></div><div class="mf"><button onclick="clM()" class="btn bO">বাতিল</button><button onclick="confirmApprove('${id}')" class="btn bGr"><i class="fas fa-check"></i>অনুমোদন</button></div>`);}

function rSales(){const el=document.getElementById('pgSales');const allSales=Object.entries(S.sales).sort((a,b)=>new Date(b[1].createdAt)-new Date(a[1].createdAt));el.innerHTML=`<div class="flex flex-col sm:flex-row items-start sm:items-center justify-between gap-3 mb-5"><div class="flex gap-2 flex-wrap"><button class="tb act" onclick="fSl('all',this)">সব</button><button class="tb" onclick="fSl('approved',this)">অনুমোদিত</button><button class="tb" onclick="fSl('handed_over',this)">হস্তান্তরিত</button><button class="tb" onclick="fSl('completed',this)">সম্পন্ন</button><button class="tb" onclick="fSl('rejected',this)">প্রত্যাখ্যাত</button></div><div class="sbx w-full sm:w-64"><i class="fas fa-search"></i><input type="text" class="fi text-sm" placeholder="খুঁজুন..." oninput="fSlQ(this.value)"></div></div><div class="dc overflow-x-auto"><table class="dt"><thead><tr><th>চালান</th><th>কাস্টমার</th><th>পণ্য</th><th>পরিশোধ্য</th><th>কিস্তি</th><th>অবস্থা</th><th>তারিখ</th><th>অ্যাকশন</th></tr></thead><tbody id="sTB"></tbody></table></div>`;window._slData=allSales;dSl(allSales);}

async function confirmHO(id){const s=S.sales[id];if(!s)return;const prod=S.products[s.productId];if(prod&&prod.stock>0){await DB.update('products/'+s.productId+'/stock',prod.stock-1);S.products[s.productId].stock=prod.stock-1;}await DB.update('sales/'+id,{status:'handed_over',handedOverAt:new Date().toISOString(),handedOverBy:S.user.uid});s.status='handed_over';clM();toast('হস্তান্তরিত');rSales();buildSidebar();updOD();}
function viewSale(id){const s=S.sales[id];if(!s)return;const c=S.customers[s.customerId],p=S.products[s.productId];const paid=(s.schedule||[]).filter(i=>i.status==='paid').reduce((a,i)=>a+(i.paidAmount||0),0)+s.downPayment;const remaining=s.totalPayable-paid;const t=td();let schHtml='<div class="mt-4"><h4 class="font-bold text-sm text-gray-600 mb-2">কিস্তি শিডিউল</h4><div class="overflow-x-auto"><table class="dt"><thead><tr><th>নং</th><th>তারিখ</th><th>পরিমাণ</th><th>পরিশোধিত</th><th>অবস্থা</th></tr></thead><tbody>';(s.schedule||[]).forEach(i=>{const overdue=i.status!=='paid'&&new Date(i.dueDate)<new Date(t)&&s.status==='handed_over';schHtml+=`<tr class="${overdue?'bg-red-50':''}"><td>${i.installmentNo}</td><td>${fd(i.dueDate)}</td><td>${fc(i.amount)}</td><td>${i.paidAmount>0?fc(i.paidAmount):'—'}</td><td>${overdue?'<span class="b bD">বকেয়া</span>':i.status==='paid'?'<span class="b bS">পরিশোধিত</span>':'<span class="b bG">অপেক্ষমান</span>'}</td></tr>`;});schHtml+='</tbody></table></div></div>';openM(`<div class="mh"><h3 class="font-bold text-lg">${s.invoiceNo}</h3><div class="flex gap-2"><button onclick="printSlip(buildSaleSlip(S.sales['${id}']))" class="btn bXS bBl"><i class="fas fa-print"></i>প্রিন্ট</button><button onclick="clM()" class="text-gray-400 hover:text-gray-600 text-xl ml-auto"><i class="fas fa-times"></i></button></div></div><div class="mbd"><div class="flex flex-wrap gap-2 mb-4">${statusB(s.status)}<span class="text-xs text-gray-400">${fdt(s.createdAt)}</span></div><div class="grid grid-cols-2 gap-4 mb-4"><div class="bg-slate-50 rounded-xl p-3"><p class="text-xs text-gray-400">কাস্টমার</p><p class="font-bold">${c?c.name:'—'}</p><p class="text-xs text-gray-500">${c?c.mobile:''}</p></div><div class="bg-slate-50 rounded-xl p-3"><p class="text-xs text-gray-400">পণ্য</p><p class="font-bold">${p?p.name:'—'}</p><p class="text-xs text-gray-500">নগদ: ${fc(s.cashPrice)}</p></div></div><div class="grid grid-cols-2 sm:grid-cols-4 gap-3 mb-4 text-sm"><div><span class="text-gray-400">ডাউন পেমেন্ট</span><p class="font-bold">${fc(s.downPayment)}</p></div><div><span class="text-gray-400">সুদ</span><p class="font-bold text-amber-600">${fc(s.totalInterest)}</p></div><div><span class="text-gray-400">মোট পরিশোধ্য</span><p class="font-bold text-pri-600">${fc(s.totalPayable)}</p></div><div><span class="text-gray-400">বাকি</span><p class="font-bold text-red-600">${fc(remaining)}</p></div></div>${s.note?`<div class="bg-amber-50 rounded-xl p-3 text-sm text-amber-700 mb-2"><i class="fas fa-sticky-note mr-1"></i>${s.note}</div>`:''}${schHtml}</div><div class="mf"><button onclick="clM()" class="btn bO">বন্ধ</button></div>`,true);}

/* ===== কিস্তি আদায় ===== */
function rPay(){const el=document.getElementById('pgPay');const active=Object.entries(S.sales).filter(([,s])=>s.status==='handed_over');const t=td();let html=`<div class="flex flex-col sm:flex-row items-start sm:items-center justify-between gap-3 mb-5"><h3 class="text-gray-500 text-sm">${active.length} টি সক্রিয় বিক্রয়</h3><div class="sbx w-full sm:w-64"><i class="fas fa-search"></i><input type="text" class="fi text-sm" placeholder="কাস্টমার খুঁজুন..." oninput="fPayQ(this.value)"></div></div>`;if(!active.length){html+=`<div class="dc"><div class="empty-state"><i class="fas fa-money-bill-wave block"></i><p>কোনো সক্রিয় কিস্তি নেই</p></div></div>`;el.innerHTML=html;return;}html+='<div class="space-y-4" id="payList">';active.forEach(([id,s])=>{const c=S.customers[s.customerId],p=S.products[s.productId];const paid=s.schedule.filter(i=>i.status==='paid').length;const total=s.schedule.length;const nextDue=s.schedule.find(i=>i.status!=='paid');const overdueCount=s.schedule.filter(i=>i.status!=='paid'&&new Date(i.dueDate)<new Date(t)).length;const progress=total?Math.round(paid/total*100):0;html+=`<div class="dc p-5 pay-item" data-search="${(c?c.name:'').toLowerCase()+(p?p.name:'').toLowerCase()}"><div class="flex flex-col md:flex-row md:items-center justify-between gap-4"><div class="flex-1"><div class="flex items-center gap-3 mb-2"><span class="text-xs font-mono bg-slate-100 px-2 py-1 rounded">${s.invoiceNo}</span>${overdueCount>0?`<span class="b bD">${overdueCount} বকেয়া</span>`:''}</div><h4 class="font-bold">${c?c.name:'—'} <span class="text-sm font-normal text-gray-400">— ${p?p.name:'—'}</span></h4><div class="flex items-center gap-4 mt-2 text-sm"><span class="text-gray-500">কিস্তি: ${paid}/${total}</span><div class="pb" style="width:100px"><div class="pf" style="width:${progress}%;background:${progress===100?'#059669':'#0d9488'}"></div></div><span class="text-gray-400">${progress}%</span></div>${nextDue?`<p class="text-xs text-gray-400 mt-1">পরবর্তী: <strong>${fc(nextDue.amount)}</strong> — ${fd(nextDue.dueDate)}</p>`:''}</div><div class="flex gap-2 flex-shrink-0"><button class="btn bGr" onclick="collectPay('${id}')"><i class="fas fa-money-bill"></i>আদায়</button><button class="btn bXS bO" onclick="viewSale('${id}')"><i class="fas fa-eye"></i></button></div></div></div>`;});html+='</div>';el.innerHTML=html;}
function fPayQ(q){q=q.toLowerCase();document.querySelectorAll('.pay-item').forEach(el=>{el.style.display=el.dataset.search.includes(q)?'':'none';});}

/* কিস্তি আদায় মোডাল — শেষে প্রিন্ট বাটন */
let _unpaidInst=[];
function collectPay(saleId){
  const s=S.sales[saleId];if(!s)return;const c=S.customers[s.customerId];const t=td();
  _unpaidInst=s.schedule.filter(i=>i.status!=='paid');
  if(!_unpaidInst.length){toast('সব কিস্তি পরিশোধিত','info');return;}
  let opts='';_unpaidInst.forEach((i,idx)=>{const overdue=new Date(i.dueDate)<new Date(t);opts+=`<div class="flex items-center justify-between p-3 rounded-xl ${overdue?'bg-red-50 border border-red-100':'bg-slate-50'} mb-2"><label class="flex items-center gap-3 cursor-pointer"><input type="checkbox" class="payChk w-4 h-4 accent-emerald-600" data-idx="${idx}" ${idx===0?'checked':''} onchange="updPayAmt()"><div><p class="font-semibold text-sm">কিস্তি ${i.installmentNo} ${overdue?'<span class="b bD ml-1">বকেয়া</span>':''}</p><p class="text-xs text-gray-400">তারিখ: ${fd(i.dueDate)}</p></div></label><span class="font-bold">${fc(i.amount)}</span></div>`;});
  openM(`<div class="mh"><h3 class="font-bold text-lg"><i class="fas fa-money-bill-wave text-emerald-500 mr-2"></i>কিস্তি আদায়</h3><button onclick="clM()" class="text-gray-400 hover:text-gray-600 text-xl"><i class="fas fa-times"></i></button></div><div class="mbd"><p class="text-sm text-gray-500 mb-3">কাস্টমার: <strong>${c?c.name:'—'}</strong></p>${opts}<div class="fg mt-3"><label class="fl">পরিশোধ্য পরিমাণ</label><input type="number" id="payAmt" class="fi" oninput="document.getElementById('payAmt')._m=true;updPayAmt()"></div><div class="fg"><label class="fl">আদায়ের তারিখ</label><input type="date" id="payDate" class="fi" value="${t}"></div></div><div class="mf"><button onclick="clM()" class="btn bO">বাতিল</button><button onclick="confirmPay('${saleId}')" class="btn bGr"><i class="fas fa-check"></i>আদায় নিশ্চিত</button></div>`);
  setTimeout(updPayAmt,50);
}
function updPayAmt(){let total=0;document.querySelectorAll('.payChk:checked').forEach(chk=>{const idx=parseInt(chk.dataset.idx);if(_unpaidInst[idx])total+=_unpaidInst[idx].amount;});const inp=document.getElementById('payAmt');if(inp&&!inp._m)inp.value=total;}

/* confirmPay — আদায় সম্পন্ন → রিসিপ্ট প্রিন্ট অপশন */
async function confirmPay(saleId){
  const s=S.sales[saleId];if(!s)return;
  const amt=parseInt(document.getElementById('payAmt').value)||0;
  const payDate=document.getElementById('payDate').value||td();
  if(amt<=0){toast('পরিমাণ দিন','warning');return;}
  const checked=[];document.querySelectorAll('.payChk:checked').forEach(chk=>checked.push(parseInt(chk.dataset.idx)));
  if(!checked.length){toast('কমপক্ষে একটি কিস্তি নির্বাচন করুন','warning');return;}
  const payId=genRcptNo();const c=S.customers[s.customerId];
  const payment={receiptNo:payId,saleId,customerId:s.customerId,customerName:c?c.name:'',amount:amt,date:payDate,installmentNos:checked.map(i=>_unpaidInst[i]?.installmentNo).filter(Boolean),collectorName:S.user.name,collectorId:S.user.uid,createdAt:new Date().toISOString()};
  try{
    const pKey=await DB.push('payments',payment);if(pKey)S.payments[pKey]=payment;
    let remaining=amt;
    for(const idx of checked.sort((a,b)=>a-b)){if(idx>=_unpaidInst.length)continue;const inst=_unpaidInst[idx];if(remaining<=0)break;const pay=Math.min(remaining,inst.amount);inst.paidAmount=pay;if(pay>=inst.amount){inst.status='paid';inst.paidDate=payDate;}remaining-=pay;}
    await DB.update('sales/'+saleId+'/schedule',s.schedule);
    if(s.schedule.every(i=>i.status==='paid')){await DB.update('sales/'+saleId,{status:'completed',completedAt:new Date().toISOString()});s.status='completed';}
    clM();toast('কিস্তি আদায় সফল — '+payId,'success');
    /* রিসিপ্ট প্রিন্ট শো */
    showPayPrintOption(payment,saleId);
    rPay();buildSidebar();updOD();
  }catch(e){toast('ব্যর্থ: '+e.message,'error');}
}
function showPayPrintOption(payment,saleId){
  openM(`<div class="mh"><h3 class="font-bold text-lg text-emerald-600"><i class="fas fa-check-circle mr-2"></i>আদায় সফল</h3><button onclick="clM()" class="text-gray-400 hover:text-gray-600 text-xl"><i class="fas fa-times"></i></button></div><div class="mbd text-center"><div class="w-16 h-16 bg-emerald-100 rounded-full flex items-center justify-center mx-auto mb-4"><i class="fas fa-check text-emerald-600 text-2xl"></i></div><p class="text-lg font-bold mb-1">${fc(payment.amount)} আদায় হয়েছে</p><p class="text-sm text-gray-500 mb-4">রিসিপ্ট: ${payment.receiptNo}</p><div class="flex gap-3 justify-center"><button onclick="printSlip(buildPaySlip(S.payments['${Object.keys(S.payments).pop()}'],S.sales['${saleId}']));clM();" class="btn bBl"><i class="fas fa-print"></i>রিসিপ্ট প্রিন্ট</button><button onclick="clM()" class="btn bO">বন্ধ করুন</button></div></div>`);
}

/* ===== রিপোর্ট (কাস্টমার ওয়াইজ যুক্ত) ===== */
function rRpt(){
  const el=document.getElementById('pgRpt');
  /* কাস্টমার লিস্ট রিপোর্ট ট্যাব যুক্ত */
  el.innerHTML=`<div class="flex gap-2 flex-wrap mb-5"><button class="tb act" onclick="rptTab('summary',this)">সারসংক্ষেপ</button><button class="tb" onclick="rptTab('customer',this)">কাস্টমার ওয়াইজ</button><button class="tb" onclick="rptTab('today',this)">আজকের আদায়</button></div><div id="rptContent"></div>`;
  renderRptSummary();
}
function rptTab(tab,btn){
  document.querySelectorAll('.tb').forEach(b=>b.classList.remove('act'));if(btn)btn.classList.add('act');
  if(tab==='summary')renderRptSummary();
  else if(tab==='customer')renderRptCustomer();
  else if(tab==='today')renderRptToday();
}
function renderRptSummary(){
  const el=document.getElementById('rptContent');let tSales=0,tColl=0,tDue=0,tProfit=0;const collByUser={};
  Object.values(S.sales).forEach(s=>{if(s.status==='rejected')return;tSales+=s.totalPayable||0;tColl+=s.downPayment||0;tProfit+=(s.totalInterest||0);(s.schedule||[]).forEach(i=>{if(i.status==='paid')tColl+=i.paidAmount||0;else tDue+=i.amount-(i.paidAmount||0);});});
  Object.values(S.payments).forEach(p=>{const name=p.collectorName||'অজানা';collByUser[name]=(collByUser[name]||0)+(p.amount||0);});
  let collHtml=Object.entries(collByUser).sort((a,b)=>b[1]-a[1]).map(([n,a])=>`<div class="flex justify-between items-center py-2 border-b border-slate-100 last:border-0"><span class="font-medium">${n}</span><span class="font-bold text-emerald-600">${fc(a)}</span></div>`).join('')||'<p class="text-gray-400 text-sm text-center py-4">কোনো আদায় নেই</p>';
  el.innerHTML=`<div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4 mb-6"><div class="sc"><p class="text-sm text-gray-500">মোট পরিশোধ্য</p><p class="text-2xl font-extrabold mt-1">${fc(tSales)}</p></div><div class="sc"><p class="text-sm text-gray-500">মোট আদায়</p><p class="text-2xl font-extrabold text-emerald-700 mt-1">${fc(tColl)}</p></div><div class="sc"><p class="text-sm text-gray-500">মোট বকেয়া</p><p class="text-2xl font-extrabold text-red-600 mt-1">${fc(tDue)}</p></div><div class="sc"><p class="text-sm text-gray-500">মোট সুদ আয়</p><p class="text-2xl font-extrabold text-amber-600 mt-1">${fc(tProfit)}</p></div></div><div class="dc"><div class="px-5 pt-5 pb-3"><h3 class="font-bold text-gray-700"><i class="fas fa-users text-pri-500 mr-2"></i>আদায়কারী অনুযায়ী</h3></div><div class="px-5 pb-5">${collHtml}</div></div>`;
}
function renderRptCustomer(){
  const el=document.getElementById('rptContent');
  /* যে কাস্টমারদের বিক্রয় আছে */
  const custMap={};
  Object.entries(S.sales).forEach(([sid,s])=>{if(s.status==='rejected')return;const cid=s.customerId;if(!custMap[cid])custMap[cid]={totalSales:0,totalPaid:0,totalDue:0,salesCount:0,sales:[]};const cm=custMap[cid];cm.salesCount++;cm.totalSales+=s.totalPayable||0;cm.totalPaid+=s.downPayment||0;(s.schedule||[]).forEach(i=>{if(i.status==='paid')cm.totalPaid+=i.paidAmount||0;else cm.totalDue+=i.amount-(i.paidAmount||0);});cm.sales.push({id:sid,invoiceNo:s.invoiceNo,status:s.status,totalPayable:s.totalPayable});});
  const entries=Object.entries(custMap);
  let custOpts='<option value="">সব কাস্টমার</option>';
  entries.forEach(([cid])=>{const c=S.customers[cid];custOpts+=`<option value="${cid}">${c?c.name:cid}</option>`;});
  el.innerHTML=`<div class="flex flex-col sm:flex-row gap-3 mb-5"><div class="sbx w-full sm:w-72"><i class="fas fa-search"></i><select id="rptCustSel" class="fi" onchange="filterCustRpt(this.value)"><option value="">সব কাস্টমার</option>${entries.map(([cid])=>{const c=S.customers[cid];return`<option value="${cid}">${c?c.name:cid} — ${c?c.mobile:''}</option>`;}).join('')}</select></div><button onclick="printCustRpt()" class="btn bBl"><i class="fas fa-print"></i>রিপোর্ট প্রিন্ট</button></div><div class="dc overflow-x-auto"><table class="dt"><thead><tr><th>কাস্টমার</th><th>মোবাইল</th><th>বিক্রয় সংখ্যা</th><th>মোট পরিশোধ্য</th><th>আদায়</th><th>বকেয়া</th><th>অ্যাকশন</th></tr></thead><tbody id="rptCustTB"></tbody></table></div>`;
  window._custRptData=entries;dCustRpt(entries);
}
function dCustRpt(entries){
  const tb=document.getElementById('rptCustTB');if(!tb)return;
  if(!entries.length){tb.innerHTML='<tr><td colspan="7" class="empty-state"><i class="fas fa-users block"></i><p>কোনো তথ্য নেই</p></td></tr>';return;}
  tb.innerHTML=entries.map(([cid,d])=>{const c=S.customers[cid];return`<tr><td class="font-semibold">${c?c.name:cid}</td><td>${c?c.mobile:'—'}</td><td class="text-center">${d.salesCount}</td><td class="font-bold">${fc(d.totalSales)}</td><td class="font-bold text-emerald-600">${fc(d.totalPaid)}</td><td class="font-bold text-red-600">${fc(d.totalDue)}</td><td><button class="btn bXS bO" onclick="viewCustRptDetail('${cid}')"><i class="fas fa-eye"></i>বিস্তারিত</button></td></tr>`;}).join('');
}
function filterCustRpt(val){
  if(!val){dCustRpt(window._custRptData);return;}
  dCustRpt(window._custRptData.filter(([cid])=>cid===val));
}
function viewCustRptDetail(cid){
  const c=S.customers[cid];const custSales=Object.entries(S.sales).filter(([,s])=>s.customerId===cid&&s.status!=='rejected');
  let html=`<div class="mh"><h3 class="font-bold text-lg"><i class="fas fa-user text-pri-500 mr-2"></i>${c?c.name:cid} — বিস্তারিত</h3><button onclick="clM()" class="text-gray-400 hover:text-gray-600 text-xl"><i class="fas fa-times"></i></button></div><div class="mbd">`;
  if(c){html+=`<div class="flex items-center gap-3 bg-slate-50 rounded-xl p-3 mb-4">${c.photo?`<img src="${c.photo}" class="w-12 h-12 rounded-lg object-cover">`:'<div class="w-12 h-12 rounded-lg bg-pri-50 flex items-center justify-center"><i class="fas fa-user text-pri-500"></i></div>'}<div><p class="font-bold">${c.name}</p><p class="text-sm text-gray-500">${c.mobile} ${c.address?'— '+c.address:''}</p></div></div>`;}
  html+='<div class="overflow-x-auto"><table class="dt"><thead><tr><th>চালান</th><th>পণ্য</th><th>পরিশোধ্য</th><th>আদায়</th><th>বকেয়া</th><th>অবস্থা</th><th></th></tr></thead><tbody>';
  let gTotal=0,gPaid=0,gDue=0;
  custSales.forEach(([sid,s])=>{const p=S.products[s.productId];const paid=s.downPayment+(s.schedule||[]).filter(i=>i.status==='paid').reduce((a,i)=>a+(i.paidAmount||0),0);const due=s.totalPayable-paid;gTotal+=s.totalPayable;gPaid+=paid;gDue+=due;
  html+=`<tr><td class="font-mono text-xs">${s.invoiceNo}</td><td>${p?p.name:'—'}</td><td class="font-bold">${fc(s.totalPayable)}</td><td class="text-emerald-600">${fc(paid)}</td><td class="text-red-600 font-bold">${fc(due)}</td><td>${statusB(s.status)}</td><td><button class="btn bXS bBl" onclick="printSlip(buildSaleSlip(S.sales['${sid}']))"><i class="fas fa-print"></i></button></td></tr>`;});
  html+=`</tbody><tfoot><tr class="bg-slate-50 font-bold"><td colspan="2">মোট</td><td>${fc(gTotal)}</td><td class="text-emerald-600">${fc(gPaid)}</td><td class="text-red-600">${fc(gDue)}</td><td colspan="2"></td></tr></tfoot></table></div></div><div class="mf"><button onclick="clM()" class="btn bO">বন্ধ</button></div>`;
  openM(html,true);
}
function printCustRpt(){
  const entries=window._custRptData||[];
  let rows='';entries.forEach(([cid,d])=>{const c=S.customers[cid];rows+=`<tr><td>${c?c.name:cid}</td><td>${c?c.mobile:'—'}</td><td style="text-align:center">${d.salesCount}</td><td style="text-align:right">${fc(d.totalSales)}</td><td style="text-align:right">${fc(d.totalPaid)}</td><td style="text-align:right">${fc(d.totalDue)}</td></tr>`;});
  printSlip(`<div class="slip" style="max-width:400px"><h2>${S.settings.shopName||'কিস্তি বিক্রয়'}</h2><div class="sub">কাস্টমার ওয়াইজ রিপোর্ট</div><div class="line"></div><table style="font-size:10px"><tr style="font-weight:bold"><td>কাস্টমার</td><td>মোবাইল</td><td>বিক্রয়</td><td style="text-align:right">পরিশোধ্য</td><td style="text-align:right">আদায়</td><td style="text-align:right">বকেয়া</td></tr>${rows}</table><div class="line"></div><div class="footer">প্রিন্ট তারিখ: ${fdt(new Date().toISOString())}</div></div>`);
}
function renderRptToday(){
  const el=document.getElementById('rptContent');const t=td();
  const todayPays=Object.entries(S.payments).filter(([,p])=>p.date===t).sort((a,b)=>new Date(b[1].createdAt)-new Date(a[1].createdAt));
  let total=0;todayPays.forEach(([,p])=>total+=p.amount||0);
  let html=`<div class="sc mb-5 inline-block"><p class="text-sm text-gray-500">আজকের তারিখ</p><p class="text-xl font-extrabold">${fd(t)}</p><p class="text-sm text-gray-500 mt-1">মোট আদায়: <strong class="text-emerald-600">${fc(total)}</strong> (${todayPays.length} টি)</p></div>`;
  html+=`<div class="dc"><div class="overflow-x-auto"><table class="dt"><thead><tr><th>রিসিপ্ট</th><th>চালান</th><th>কাস্টমার</th><th>কিস্তি নং</th><th>পরিমাণ</th><th>আদায়কারী</th><th>সময়</th><th></th></tr></thead><tbody>`;
  if(!todayPays.length)html+='<tr><td colspan="8" class="empty-state"><i class="fas fa-receipt block"></i><p>আজ কোনো আদায় নেই</p></td></tr>';
  todayPays.forEach(([pid,p])=>{const s=S.sales[p.saleId];html+=`<tr><td class="font-mono text-xs">${p.receiptNo}</td><td class="font-mono text-xs">${s?s.invoiceNo:'—'}</td><td class="font-medium">${p.customerName||'—'}</td><td>${(p.installmentNos||[]).join(', ')}</td><td class="font-bold text-emerald-600">${fc(p.amount)}</td><td class="text-sm">${p.collectorName||'—'}</td><td class="text-xs text-gray-400">${fdt(p.createdAt)}</td><td><button class="btn bXS bBl" onclick="printSlip(buildPaySlip(S.payments['${pid}'],S.sales['${p.saleId}']))"><i class="fas fa-print"></i></button></td></tr>`;});
  html+='</tbody></table></div></div>';el.innerHTML=html;
}

/* ===== ইউজার ম্যানেজমেন্ট ===== */
function rUsers(){const el=document.getElementById('pgUsers');const us=Object.entries(S.users);el.innerHTML=`<div class="flex justify-between items-center mb-5"><p class="text-sm text-gray-500">${us.length} জন ইউজার</p>${S.user.role==='admin'?`<button class="btn bP" onclick="sUF()"><i class="fas fa-plus"></i>নতুন ইউজার</button>`:''}</div><div class="dc overflow-x-auto"><table class="dt"><thead><tr><th>আইডি</th><th>নাম</th><th>ভূমিকা</th><th>তৈরি</th><th>অ্যাকশন</th></tr></thead><tbody id="uTB"></tbody></table></div>`;const tb=document.getElementById('uTB');tb.innerHTML=us.map(([id,u])=>`<tr><td class="font-mono text-sm">${u.uid}</td><td class="font-semibold">${u.name}</td><td>${u.role==='admin'?'<span class="b bPur">প্রশাসক</span>':'<span class="b bB">সেলসম্যান</span>'}</td><td class="text-sm text-gray-500">${fd(u.createdAt)}</td><td>${id!=='KS'&&S.user.role==='admin'?`<div class="flex gap-1"><button class="btn bXS bO" onclick="sUF('${id}')"><i class="fas fa-edit"></i></button><button class="btn bXS bX" onclick="dUsr('${id}')"><i class="fas fa-trash"></i></button></div>`:'<span class="text-xs text-gray-400">সিস্টেম</span>'}</td></tr>`).join('');}
function sUF(eid){
  const u=eid?S.users[eid]:{uid:'',name:'',password:'',role:'salesman'};
  openM(`<div class="mh"><h3 class="font-bold text-lg">${eid?'সম্পাদনা':'নতুন ইউজার'}</h3><button onclick="clM()" class="text-gray-400 hover:text-gray-600 text-xl"><i class="fas fa-times"></i></button></div><div class="mbd"><input type="hidden" id="uE" value="${eid||''}"><div class="fg"><label class="fl">ইউজার আইডি *</label><input type="text" id="uId" class="fi" value="${u.uid}" ${eid?'readonly style="background:#f8fafc"':''} placeholder="যেমন: USER1"></div><div class="fg"><label class="fl">নাম *</label><input type="text" id="uNm" class="fi" value="${u.name}"></div><div class="fg"><label class="fl">পাসওয়ার্ড *${eid?' (খালি রাখলে আগেরটাই থাকবে)':''}</label><input type="password" id="uPw" class="fi" value="${eid?'':u.password}" placeholder="${eid?'পরিবর্তন না করলে খালি রাখুন':'পাসওয়ার্ড'}"></div><div class="fg"><label class="fl">ভূমিকা</label><select id="uRl" class="fi"><option value="salesman" ${u.role==='salesman'?'selected':''}>সেলসম্যান</option><option value="admin" ${u.role==='admin'?'selected':''}>প্রশাসক</option></select></div></div><div class="mf"><button onclick="clM()" class="btn bO">বাতিল</button><button onclick="svUsr()" class="btn bP"><i class="fas fa-save"></i>${eid?'আপডেট':'সংরক্ষণ'}</button></div>`);
}
async function svUsr(){
  const uid=document.getElementById('uId').value.trim();
  const name=document.getElementById('uNm').value.trim();
  const pw=document.getElementById('uPw').value;
  const role=document.getElementById('uRl').value;
  const eid=document.getElementById('uE').value;
  if(!uid||!name){toast('আইডি ও নাম দিন','warning');return;}
  if(!eid&&!pw){toast('পাসওয়ার্ড দিন','warning');return;}
  if(eid){
    const upd={name,role};if(pw)upd.password=pw;
    await DB.update('users/'+eid,upd);S.users[eid]={...S.users[eid],...upd};toast('আপডেট হয়েছে');
  }else{
    if(S.users[uid]){toast('এই আইডি আগে থেকেই আছে','error');return;}
    const d={uid,name,password:pw,role,createdAt:new Date().toISOString()};
    await DB.set('users/'+uid,d);S.users[uid]=d;toast('যোগ হয়েছে');
  }
  clM();rUsers();
}
async function dUsr(id){
  openM(`<div class="mh"><h3 class="font-bold text-lg text-red-600"><i class="fas fa-exclamation-triangle mr-2"></i>মুছুন</h3><button onclick="clM()" class="text-gray-400 hover:text-gray-600 text-xl"><i class="fas fa-times"></i></button></div><div class="mbd"><p><strong>${S.users[id]?.name||id}</strong> মুছে ফেলতে চান?</p></div><div class="mf"><button onclick="clM()" class="btn bO">না</button><button onclick="confirmDelU('${id}')" class="btn bX"><i class="fas fa-trash"></i>হ্যাঁ</button></div>`);
}
async function confirmDelU(id){await DB.remove('users/'+id);delete S.users[id];clM();toast('মুছে ফেলা হয়েছে');rUsers();}

/* ===== সেটিংস ===== */
function rSet(){
  const el=document.getElementById('pgSet');const st=S.settings;
  el.innerHTML=`<div class="dc max-w-2xl mx-auto"><div class="p-5 border-b border-slate-100"><h3 class="font-bold text-lg"><i class="fas fa-cog text-pri-500 mr-2"></i>সেটিংস</h3></div><div class="p-6"><div class="fg"><label class="fl">দোকানের নাম</label><input type="text" id="stNm" class="fi" value="${st.shopName||''}"></div><div class="fg"><label class="fl">ঠিকানা</label><input type="text" id="stAd" class="fi" value="${st.shopAddress||''}"></div><div class="fg"><label class="fl">ফোন</label><input type="text" id="stPh" class="fi" value="${st.shopPhone||''}"></div><div class="h-px bg-slate-200 my-5"></div><h4 class="font-bold text-gray-700 mb-3"><i class="fas fa-percentage text-amber-500 mr-2"></i>ডিফল্ট সুদ সেটিংস</h4><div class="grid grid-cols-1 sm:grid-cols-2 gap-4"><div class="fg"><label class="fl">প্রতি ১,০০০ টাকায় সুদ (টাকা)</label><input type="number" id="stRt" class="fi" value="${st.defaultInterestPerThousand||300}"><p class="text-xs text-gray-400 mt-1">যেমন: ৩০০ মানে প্রতি হাজারে ৩০০ টাকা সুদ</p></div><div class="fg"><label class="fl">ডিফল্ট কিস্তি সংখ্যা</label><input type="number" id="stMs" class="fi" value="${st.defaultInstallmentMonths||12}" min="1" max="36"></div></div><button onclick="svSet()" class="btn bP w-full justify-center py-3 mt-6 text-base"><i class="fas fa-save"></i>সংরক্ষণ করুন</button></div></div>`;
}
async function svSet(){
  const d={
    shopName:document.getElementById('stNm').value.trim(),
    shopAddress:document.getElementById('stAd').value.trim(),
    shopPhone:document.getElementById('stPh').value.trim(),
    defaultInterestPerThousand:parseInt(document.getElementById('stRt').value)||300,
    defaultInstallmentMonths:parseInt(document.getElementById('stMs').value)||12
  };
  await DB.set('settings',d);S.settings={...S.settings,...d};buildSidebar();toast('সেটিংস সংরক্ষিত হয়েছে');
}

/* ===== অনলাইন/অফলাইন মনিটর ===== */
function monitorConnection(){
  if(!db)return;
  db.ref('.info/connected').on('value',snap=>{
    const badge=document.getElementById('onlineBadge');if(!badge)return;
    if(snap.val()===true){badge.innerHTML='<i class="fas fa-cloud"></i>অনলাইন';badge.className='hidden sm:flex items-center gap-1.5 text-xs font-semibold text-emerald-600 bg-emerald-50 px-3 py-1.5 rounded-lg';}
    else{badge.innerHTML='<i class="fas fa-cloud-slash"></i>অফলাইন';badge.className='hidden sm:flex items-center gap-1.5 text-xs font-semibold text-red-600 bg-red-50 px-3 py-1.5 rounded-lg';}
  });
}

/* ===== স্টার্টআপ ===== */
tryFirebase();
</script>
</body>
