<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Attendance Management - Kushtia Depot</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<style>
:root{--bg:#0a0f1a;--bg2:#111827;--card:#151f30;--card2:#1a2740;--accent:#00d4aa;--accent2:#00f0c0;--accent-dim:#00a88a;--warn:#f59e0b;--danger:#ef4444;--text:#e8edf5;--text2:#8899b0;--muted:#4a5a72;--border:#1e2e44;--border2:#2a3d58}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Outfit',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
::-webkit-scrollbar{width:6px;height:6px}::-webkit-scrollbar-track{background:var(--bg2)}::-webkit-scrollbar-thumb{background:var(--muted);border-radius:3px}
.view{display:none;min-height:100vh}.view.active{display:flex}
#loginView{align-items:center;justify-content:center;position:relative}
.bg-blobs{position:fixed;inset:0;z-index:0;overflow:hidden;pointer-events:none}
.blob{position:absolute;border-radius:50%;filter:blur(100px);opacity:.15;animation:blobMove 20s ease-in-out infinite}
.blob:nth-child(1){width:500px;height:500px;background:var(--accent);top:-10%;left:-10%}
.blob:nth-child(2){width:400px;height:400px;background:#f59e0b;bottom:-10%;right:-10%;animation-delay:-7s}
.blob:nth-child(3){width:300px;height:300px;background:#ef4444;top:50%;left:50%;animation-delay:-14s}
@keyframes blobMove{0%,100%{transform:translate(0,0) scale(1)}25%{transform:translate(50px,-80px) scale(1.1)}50%{transform:translate(-60px,40px) scale(.9)}75%{transform:translate(30px,60px) scale(1.05)}}
.login-card{background:rgba(21,31,48,.85);backdrop-filter:blur(20px);border:1px solid var(--border2);border-radius:20px;padding:48px 40px;width:440px;max-width:92vw;position:relative;z-index:1;box-shadow:0 25px 60px rgba(0,0,0,.5)}
.login-card h1{font-size:28px;font-weight:800;letter-spacing:-.5px}.login-card p{color:var(--text2);font-size:14px;margin-top:4px}
.login-input{width:100%;padding:14px 16px;background:var(--bg);border:1px solid var(--border);border-radius:12px;color:var(--text);font-size:15px;font-family:inherit;outline:none;transition:border .3s}.login-input:focus{border-color:var(--accent)}
.login-btn{width:100%;padding:15px;background:linear-gradient(135deg,var(--accent-dim),var(--accent));border:none;border-radius:12px;color:#0a0f1a;font-size:16px;font-weight:700;font-family:inherit;cursor:pointer;transition:all .3s;margin-top:8px}.login-btn:hover{transform:translateY(-2px);box-shadow:0 8px 25px rgba(0,212,170,.3)}.login-btn:disabled{opacity:.6;cursor:not-allowed;transform:none!important}
.dash-header{background:var(--bg2);border-bottom:1px solid var(--border);padding:16px 28px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50;backdrop-filter:blur(10px)}
.dash-header .logo-text{font-size:18px;font-weight:700;color:var(--accent)}
.sidebar{width:250px;background:var(--bg2);border-right:1px solid var(--border);padding:20px 0;flex-shrink:0;overflow-y:auto;min-height:calc(100vh - 60px)}
.sidebar-item{display:flex;align-items:center;gap:12px;padding:12px 24px;color:var(--text2);cursor:pointer;transition:all .2s;font-size:14px;font-weight:500;border-left:3px solid transparent}
.sidebar-item:hover{background:rgba(0,212,170,.05);color:var(--text)}.sidebar-item.active{background:rgba(0,212,170,.08);color:var(--accent);border-left-color:var(--accent)}
.sidebar-item i{width:20px;text-align:center;font-size:15px}
.card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:24px;transition:all .3s}.card:hover{border-color:var(--border2)}
.stat-card{position:relative;overflow:hidden}.stat-card::after{content:'';position:absolute;top:-20px;right:-20px;width:80px;height:80px;border-radius:50%;opacity:.08}
.stat-card.green::after{background:var(--accent)}.stat-card.amber::after{background:var(--warn)}.stat-card.red::after{background:var(--danger)}.stat-card.blue::after{background:#3b82f6}
.data-table{width:100%;border-collapse:separate;border-spacing:0}
.data-table th{background:var(--bg2);color:var(--text2);font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;padding:12px 14px;text-align:left;border-bottom:1px solid var(--border);position:sticky;top:0;z-index:2}
.data-table td{padding:10px 14px;border-bottom:1px solid var(--border);font-size:13px;color:var(--text)}.data-table tr:hover td{background:rgba(0,212,170,.03)}
.badge{display:inline-flex;align-items:center;justify-content:center;width:30px;height:30px;border-radius:8px;font-size:12px;font-weight:700}
.badge.P{background:rgba(0,212,170,.15);color:#00d4aa}.badge.A{background:rgba(239,68,68,.15);color:#ef4444}.badge.T{background:rgba(59,130,246,.15);color:#60a5fa}.badge.L{background:rgba(245,158,11,.15);color:#f59e0b}.badge.H{background:rgba(168,85,247,.15);color:#a855f7}
.badge.mini{width:22px;height:22px;font-size:10px;border-radius:5px}
.btn{padding:10px 20px;border:none;border-radius:10px;font-size:13px;font-weight:600;font-family:inherit;cursor:pointer;transition:all .2s;display:inline-flex;align-items:center;gap:8px}
.btn-primary{background:var(--accent);color:#0a0f1a}.btn-primary:hover{background:var(--accent2);transform:translateY(-1px)}
.btn-secondary{background:var(--card2);color:var(--text);border:1px solid var(--border)}.btn-secondary:hover{border-color:var(--accent)}
.btn-danger{background:rgba(239,68,68,.15);color:#ef4444}.btn-danger:hover{background:rgba(239,68,68,.25)}
.btn-warn{background:rgba(245,158,11,.15);color:#f59e0b}.btn-warn:hover{background:rgba(245,158,11,.25)}
.btn-sm{padding:7px 14px;font-size:12px;border-radius:8px}.btn-xs{padding:5px 10px;font-size:11px;border-radius:6px}
.form-group{margin-bottom:16px}.form-label{display:block;font-size:12px;font-weight:600;color:var(--text2);margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px}
.form-input,.form-select{width:100%;padding:11px 14px;background:var(--bg);border:1px solid var(--border);border-radius:10px;color:var(--text);font-size:14px;font-family:inherit;outline:none;transition:border .3s}.form-input:focus,.form-select:focus{border-color:var(--accent)}
.form-select option{background:var(--bg2);color:var(--text)}
.status-btn{width:56px;height:56px;border-radius:14px;border:2px solid var(--border);background:var(--bg);color:var(--text2);font-size:16px;font-weight:800;cursor:pointer;transition:all .2s;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px}
.status-btn span{font-size:9px;font-weight:500;letter-spacing:.3px}.status-btn:hover{border-color:var(--muted);transform:translateY(-2px)}
.status-btn.selected-P{border-color:#00d4aa;background:rgba(0,212,170,.1);color:#00d4aa}
.status-btn.selected-A{border-color:#ef4444;background:rgba(239,68,68,.1);color:#ef4444}
.status-btn.selected-T{border-color:#60a5fa;background:rgba(59,130,246,.1);color:#60a5fa}
.status-btn.selected-L{border-color:#f59e0b;background:rgba(245,158,11,.1);color:#f59e0b}
.status-btn.selected-H{border-color:#a855f7;background:rgba(168,85,247,.1);color:#a855f7}
.status-btn:disabled{opacity:.4;cursor:not-allowed;transform:none!important}
.toast-container{position:fixed;top:20px;right:20px;z-index:9999;display:flex;flex-direction:column;gap:10px}
.toast{padding:14px 20px;border-radius:12px;font-size:13px;font-weight:500;display:flex;align-items:center;gap:10px;animation:toastIn .4s ease;min-width:280px;box-shadow:0 10px 30px rgba(0,0,0,.3)}
.toast.success{background:rgba(0,212,170,.15);border:1px solid rgba(0,212,170,.3);color:#00f0c0}
.toast.error{background:rgba(239,68,68,.15);border:1px solid rgba(239,68,68,.3);color:#fca5a5}
.toast.info{background:rgba(59,130,246,.15);border:1px solid rgba(59,130,246,.3);color:#93bbfd}
.toast.out{animation:toastOut .3s ease forwards}
@keyframes toastIn{from{opacity:0;transform:translateX(100px)}to{opacity:1;transform:translateX(0)}}
@keyframes toastOut{to{opacity:0;transform:translateX(100px)}}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);backdrop-filter:blur(4px);z-index:1000;display:flex;align-items:center;justify-content:center;padding:20px}
.modal-box{background:var(--card);border:1px solid var(--border2);border-radius:20px;padding:32px;max-width:600px;width:100%;animation:modalIn .3s ease;max-height:90vh;overflow-y:auto}.modal-box.wide{max-width:960px}
@keyframes modalIn{from{opacity:0;transform:scale(.9)}to{opacity:1;transform:scale(1)}}
.active-badge{background:rgba(0,212,170,.12);color:#00d4aa;padding:3px 10px;border-radius:6px;font-size:11px;font-weight:600}
.inactive-badge{background:rgba(239,68,68,.12);color:#ef4444;padding:3px 10px;border-radius:6px;font-size:11px;font-weight:600}
.holiday-badge{background:rgba(168,85,247,.12);color:#a855f7;padding:3px 10px;border-radius:6px;font-size:11px;font-weight:600}
.pending-badge{background:rgba(245,158,11,.12);color:#f59e0b;padding:3px 10px;border-radius:6px;font-size:11px;font-weight:600}
.approved-badge{background:rgba(0,212,170,.12);color:#00d4aa;padding:3px 10px;border-radius:6px;font-size:11px;font-weight:600}
.auto-absent-badge{background:rgba(239,68,68,.08);color:#f87171;padding:3px 10px;border-radius:6px;font-size:10px;font-weight:600;border:1px dashed rgba(239,68,68,.3)}
.not-submitted-badge{background:rgba(239,68,68,.08);color:#fca5a5;padding:3px 10px;border-radius:6px;font-size:10px;font-weight:600;border:1px dashed rgba(239,68,68,.25)}
.role-badge-dic{background:rgba(239,68,68,.12);color:#ef4444;padding:3px 10px;border-radius:6px;font-size:11px;font-weight:600}
.role-badge-adic{background:rgba(59,130,246,.12);color:#60a5fa;padding:3px 10px;border-radius:6px;font-size:11px;font-weight:600}
.role-badge-rsm{background:rgba(168,85,247,.12);color:#a855f7;padding:3px 10px;border-radius:6px;font-size:11px;font-weight:600}
.role-badge-am{background:rgba(245,158,11,.12);color:#f59e0b;padding:3px 10px;border-radius:6px;font-size:11px;font-weight:600}
.role-badge-mpo{background:rgba(0,212,170,.12);color:#00d4aa;padding:3px 10px;border-radius:6px;font-size:11px;font-weight:600}
.loc-link{color:var(--accent);font-size:11px;text-decoration:none;display:inline-flex;align-items:center;gap:4px}.loc-link:hover{text-decoration:underline}
.fade-in{animation:fadeIn .4s ease}@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.late-dot{display:inline-block;width:6px;height:6px;border-radius:50%;background:#f59e0b;margin-left:2px;vertical-align:middle;animation:latePulse 2s ease-in-out infinite}
@keyframes latePulse{0%,100%{opacity:1}50%{opacity:.4}}
.shift-card{background:var(--bg);border:1px solid var(--border);border-radius:12px;padding:16px;margin-bottom:12px}
.shift-card h4{font-size:13px;font-weight:700;margin-bottom:10px;display:flex;align-items:center;gap:8px}
.shift-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.shift-row .form-group{margin:0}
.time-cell{font-size:9px;color:var(--text2);white-space:nowrap}
.toggle-switch{position:relative;width:44px;height:24px;cursor:pointer;display:inline-block;vertical-align:middle}
.toggle-switch input{opacity:0;width:0;height:0}
.toggle-slider{position:absolute;inset:0;background:var(--danger);border-radius:24px;transition:.3s}
.toggle-slider::before{content:'';position:absolute;height:18px;width:18px;left:3px;bottom:3px;background:#fff;border-radius:50%;transition:.3s}
.toggle-switch input:checked+.toggle-slider{background:var(--accent)}.toggle-switch input:checked+.toggle-slider::before{transform:translateX(20px)}
.rpt-table{width:100%;border-collapse:collapse}
.rpt-table th{font-size:11px;font-weight:700;padding:4px 3px;height:40px;vertical-align:middle;white-space:nowrap;text-align:center}
.rpt-table td{font-size:11px;padding:4px 3px;height:36px;vertical-align:middle;white-space:nowrap;text-align:center}
.rpt-table tr:hover td{background:rgba(0,212,170,.03)}
.tour-cam{background:rgba(59,130,246,.06);border:1px dashed rgba(59,130,246,.3);border-radius:12px;padding:16px;margin-top:12px}
.tour-file-input{position:absolute;width:1px;height:1px;opacity:0;overflow:hidden;pointer-events:none}
.tour-capture-label{display:inline-flex;align-items:center;gap:8px;padding:10px 20px;border:1px solid var(--border);border-radius:10px;font-size:13px;font-weight:600;font-family:'Outfit',sans-serif;background:var(--card2);color:var(--text);cursor:pointer;transition:all .2s}.tour-capture-label:hover{border-color:var(--accent);transform:translateY(-1px)}
.sig-upload-area{border:2px dashed var(--border2);border-radius:14px;padding:24px;text-align:center;cursor:pointer;transition:all .3s;background:rgba(0,212,170,.02);position:relative;min-height:100px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px}
.sig-upload-area:hover{border-color:var(--accent);background:rgba(0,212,170,.05)}.sig-upload-area.has-sig{border-style:solid;border-color:var(--accent-dim)}
.sig-preview{max-height:60px;max-width:160px;border-radius:8px}.sig-file-input{display:none}
.user-tab{padding:10px 20px;border:none;border-bottom:2px solid transparent;background:none;color:var(--text2);font-size:13px;font-weight:600;font-family:inherit;cursor:pointer;transition:all .2s}
.user-tab:hover{color:var(--text)}.user-tab.active{color:var(--accent);border-bottom-color:var(--accent)}
.am-group-header{background:rgba(245,158,11,.06);border:1px solid rgba(245,158,11,.15);border-radius:10px;padding:10px 16px;margin:12px 0 8px;display:flex;align-items:center;gap:10px}
.am-group-header i{color:#f59e0b;font-size:16px}
.db-status{position:fixed;bottom:10px;left:10px;z-index:9999;font-size:10px;padding:4px 10px;border-radius:6px;font-weight:600;display:flex;align-items:center;gap:6px}
.db-status.ok{background:rgba(0,212,170,.15);color:#00d4aa;border:1px solid rgba(0,212,170,.3)}
.db-status.err{background:rgba(239,68,68,.15);color:#ef4444;border:1px solid rgba(239,68,68,.3)}
.db-status.loading{background:rgba(245,158,11,.15);color:#f59e0b;border:1px solid rgba(245,158,11,.3)}
@media(max-width:768px){.sidebar{width:60px;padding:10px 0}.sidebar-item{padding:12px 0;justify-content:center;border-left:none;border-bottom:2px solid transparent;font-size:0}.sidebar-item i{font-size:18px}.sidebar-item span{display:none}.sidebar-item.active{border-bottom-color:var(--accent)}.login-card{padding:32px 24px}.dash-header{padding:12px 16px}}
</style>
</head>
<body>
<div class="bg-blobs"><div class="blob"></div><div class="blob"></div><div class="blob"></div></div>
<div class="toast-container" id="toastBox"></div>
<div id="modalOverlay" style="display:none"></div>
<div id="dbStatus" class="db-status loading"><i class="fa-solid fa-spinner fa-spin"></i> Connecting...</div>

<div id="loginView" class="view active">
<div class="login-card fade-in">
<div class="flex items-center gap-3 mb-1">
<div style="width:44px;height:44px;background:linear-gradient(135deg,var(--accent-dim),var(--accent));border-radius:12px;display:flex;align-items:center;justify-content:center"><i class="fa-solid fa-clipboard-check" style="color:#0a0f1a;font-size:20px"></i></div>
<div><h1>Attendance System</h1><p>Kushtia Depot</p></div>
</div>
<div style="height:1px;background:var(--border);margin:24px 0"></div>

<p style="text-align:center;margin-top:16px;font-size:12px;color:var(--muted)"><i class="fa-solid fa-shield-halved"></i> Secure Attendance Management</p>

</div>

<div id="userView" class="view" style="flex-direction:column">
<header class="dash-header">
<div class="flex items-center gap-3"><i class="fa-solid fa-clipboard-check" style="color:var(--accent);font-size:20px"></i><span class="logo-text">Attendance System</span></div>

<header class="dash-header">
<div class="flex items-center gap-3"><i class="fa-solid fa-clipboard-check" style="color:var(--accent);font-size:20px"></i><span class="logo-text">Admin Panel</span></div>
<div class="flex items-center gap-4"><span id="dicDisplayId" style="font-size:13px;color:var(--text2)"></span><button class="btn btn-sm btn-secondary" onclick="handleLogout()"><i class="fa-solid fa-sign-out"></i> Logout</button></div>
</header>
<div style="display:flex;flex:1;overflow:hidden">

</div>

<script>
/* ===== CONFIG ===== */
var DIC_ID='KS',DIC_PASS='Monico@Ku007';
var SHIFT1_IN='08:00',SHIFT1_OUT='14:30',SHIFT2_IN='16:00',SHIFT2_OUT='22:00';
var SHIFT1_LATE='08:30',SHIFT2_LATE='16:30';
var DESIG_ORDER=['Depot In-Charge','Asst. Depot In-Charge','RSM','AM','MPO'];
var DESIGNATIONS=DESIG_ORDER;

/* ===== FIREBASE INIT WITH databaseURL ===== */
var DB_URL='https://attendance-kushtia-default-rtdb.europe-west1.firebasedatabase.app';
const firebaseConfig={
  apiKey: "AIzaSyAgVUuT5zmagGOchLAb-JCVQV2fSsUPacw",
  authDomain: "filed-force-attendance.firebaseapp.com",
  databaseURL: "https://filed-force-attendance-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "filed-force-attendance",
  storageBucket: "filed-force-attendance.firebasestorage.app",
  messagingSenderId: "23372439530",
  appId: "1:23372439530:web:3f83db8a87a9fa56695c93",
  measurementId: "G-TSHRGPF2EH"
};

var dbConnected=false;
try{
  firebase.initializeApp(firebaseConfig);
  var db=firebase.database();
  /* Test connection */
  db.ref('.info/connected').on('value',function(snap){
    dbConnected=snap.val()===true;
    var el=document.getElementById('dbStatus');
    if(dbConnected){
      el.className='db-status ok';
      el.innerHTML='<i class="fa-solid fa-circle" style="font-size:6px"></i> Database Connected';
      setTimeout(function(){el.style.display='none'},4000);
    }else{
      el.className='db-status err';
      el.innerHTML='<i class="fa-solid fa-circle" style="font-size:6px"></i> Database Disconnected';
    }
  });
}catch(e){
  document.getElementById('dbStatus').className='db-status err';
  document.getElementById('dbStatus').innerHTML='<i class="fa-solid fa-triangle-exclamation"></i> Firebase Init Error: '+e.message;
  console.error('Firebase init error:',e);
}

/* ===== STATE ===== */
var currentUser=null,allUsers={},allHolidays={},allSignatures={},currentTab='overview',currentUTab='attendance',selectedStatus='',dicEntryStatus='',tourImageData=null,imgCache={};

/* ===== UTILITY ===== */
function todayStr(){var d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0')}
function firstDayOfMonth(){var d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-01'}
function getDaysInMonth(y,m){return new Date(y,m+1,0).getDate()}
function formatBD(ds){if(!ds)return'';var d=new Date(ds+'T00:00:00');return d.toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'})}
function formatPrintDate(ds){if(!ds)return'';var p=ds.split('-');return p[2]+'/'+p[1]+'/'+p[0]}
function statusLabel(s){return{P:'Present',A:'Absent',T:'Tour',L:'Leave',H:'Holiday'}[s]||s}
function monthName(m){return['January','February','March','April','May','June','July','August','September','October','November','December'][m]}
function isFriday(ds){return new Date(ds+'T00:00:00').getDay()===5}
function isHoliday(ds){return allHolidays.hasOwnProperty(ds)||isFriday(ds)}
function getHolidayName(ds){if(allHolidays.hasOwnProperty(ds))return allHolidays[ds];if(isFriday(ds))return'Weekly Holiday (Friday)';return''}
function desigOrder(d){var i=DESIG_ORDER.indexOf(d);return i===-1?99:i}
function getRoleFromDesig(d){if(d==='Depot In-Charge')return'DIC';if(d==='Asst. Depot In-Charge')return'ADIC';if(d==='RSM')return'RSM';if(d==='AM')return'AM';return'MPO'}
function roleBadge(r){var cls={DIC:'role-badge-dic',ADIC:'role-badge-adic',RSM:'role-badge-rsm',AM:'role-badge-am',MPO:'role-badge-mpo'}[r]||'role-badge-mpo';return'<span class="'+cls+'">'+r+'</span>'}
function dateRange(f,t){var dates=[];var c=new Date(f+'T00:00:00'),e=new Date(t+'T00:00:00');while(c<=e){dates.push(c.getFullYear()+'-'+String(c.getMonth()+1).padStart(2,'0')+'-'+String(c.getDate()).padStart(2,'0'));c.setDate(c.getDate()+1)}return dates}
function getCurrentTime(){var d=new Date();return String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0')}
function formatTime12(t){if(!t)return'--';var p=t.split(':'),h=parseInt(p[0]),m=p[1],ap=h>=12?'PM':'AM';h=h%12;if(h===0)h=12;return h+':'+m+' '+ap}
function formatTimeShort(t){if(!t)return'';var p=t.split(':'),h=parseInt(p[0]),m=p[1],ap=h>=12?'PM':'AM';h=h%12;if(h===0)h=12;return h+':'+m+' '+ap}
function isLateS1(t){return t&&t>SHIFT1_LATE}
function isLateS2(t){return t&&t>SHIFT2_LATE}
function lateIcon(){return'<span class="late-dot" title="Late Entry"></span>'}
function countShiftLETs(att){if(!att)return 0;var c=0;if(att.shift1&&att.shift1.inTime&&isLateS1(att.shift1.inTime))c++;if(att.shift2&&att.shift2.inTime&&isLateS2(att.shift2.inTime))c++;return c}
function isShiftsComplete(att){return att&&att.shift1&&att.shift1.inTime&&att.shift1.outTime&&att.shift2&&att.shift2.inTime&&att.shift2.outTime}
function getAttStatus(ds,uid,att){if(att&&att.status)return att.status;if(isHoliday(ds))return'H';if(ds<=todayStr())return'A';return''}
function isAutoAbsent(ds,uid,att){return(!att||!att.status)&&!isHoliday(ds)&&ds<=todayStr()}
function getMPOsOfAM(amId){return Object.entries(allUsers).filter(function(e){return e[1].active!==false&&e[1].role==='MPO'&&e[1].assignedAM===amId})}
function getAMsOfRSM(rsmId){return Object.entries(allUsers).filter(function(e){return e[1].active!==false&&e[1].role==='AM'&&e[1].assignedRSM===rsmId})}
function getRSMTeam(rsmId){var ams=getAMsOfRSM(rsmId);var team=[];for(var i=0;i<ams.length;i++){team.push(ams[i]);var mpos=getMPOsOfAM(ams[i][0]);for(var j=0;j<mpos.length;j++)team.push(mpos[j])}return team}

function captureLocation(){return new Promise(function(resolve){if(!navigator.geolocation){resolve(null);return}navigator.geolocation.getCurrentPosition(function(pos){var loc={lat:pos.coords.latitude,lng:pos.coords.longitude,acc:Math.round(pos.coords.accuracy),name:''};fetch('https://nominatim.openstreetmap.org/reverse?format=json&lat='+loc.lat+'&lon='+loc.lng+'&zoom=18&addressdetails=1',{headers:{'Accept-Language':'bn,en'}}).then(function(r){return r.json()}).then(function(data){if(data&&data.display_name)loc.name=data.display_name;resolve(loc)}).catch(function(){resolve(loc)})},function(){resolve(null)},{timeout:10000,enableHighAccuracy:true})})}
function locHTML(loc){if(!loc||!loc.lat)return'<span style="color:var(--muted);font-size:11px">--</span>';var nm=loc.name?'<div style="font-size:9px;color:var(--text2);margin-top:2px;max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="'+loc.name.replace(/"/g,'&quot;')+'"><i class="fa-solid fa-map-pin" style="margin-right:2px;color:var(--accent)"></i>'+loc.name.substring(0,60)+'</div>':'';return'<a href="https://www.google.com/maps?q='+loc.lat+','+loc.lng+'" target="_blank" class="loc-link"><i class="fa-solid fa-location-dot"></i>'+loc.lat.toFixed(4)+', '+loc.lng.toFixed(4)+'</a>'+nm}

/* ===== IMAGE COMPRESS ===== */
function compressImage(file){return new Promise(function(resolve){var reader=new FileReader();reader.onload=function(e){var img=new Image();img.onload=function(){var canvas=document.createElement('canvas'),maxW=800,maxH=600,w=img.width,h=img.height;if(w>maxW){h=h*maxW/w;w=maxW}if(h>maxH){w=w*maxH/h;h=maxH}canvas.width=w;canvas.height=h;canvas.getContext('2d').drawImage(img,0,0,w,h);resolve(canvas.toDataURL('image/jpeg',0.6))};img.src=e.target.result};reader.readAsDataURL(file)})}
function compressSignature(file){return new Promise(function(resolve){var reader=new FileReader();reader.onload=function(e){var img=new Image();img.onload=function(){var canvas=document.createElement('canvas'),maxW=400,maxH=150,w=img.width,h=img.height;if(w>maxW){h=h*maxW/w;w=maxW}if(h>maxH){w=w*maxH/h;h=maxH}canvas.width=w;canvas.height=h;canvas.getContext('2d').drawImage(img,0,0,w,h);resolve(canvas.toDataURL('image/png'))};img.src=e.target.result};reader.readAsDataURL(file)})}

/* ===== LOGIN - FIXED WITH TRY-CATCH ===== */
async function handleLogin(){
  var id=document.getElementById('loginId').value.trim(),
      pass=document.getElementById('loginPass').value.trim(),
      errEl=document.getElementById('loginError'),
      btn=document.getElementById('loginBtn');

  errEl.style.display='none';

  if(!id||!pass){
    errEl.style.display='block';
    errEl.innerHTML='<i class="fa-solid fa-triangle-exclamation" style="margin-right:6px"></i>Enter both ID and Password';
    return;
  }

  btn.disabled=true;
  btn.innerHTML='<i class="fa-solid fa-spinner fa-spin"></i> Logging in...';

  try{
    /* === DIC Admin Login === */
    if(id===DIC_ID&&pass===DIC_PASS){
      try{
        var snap=await db.ref('users/'+DIC_ID).once('value');
        if(!snap.exists()){
          await db.ref('users/'+DIC_ID).set({
            id:DIC_ID,name:'Depot In-Charge',designation:'Depot In-Charge',
            depot:'Kushtia',joinDate:todayStr(),salary:0,mobile:'',
            role:'DIC',password:DIC_PASS,active:true,createdAt:Date.now()
          });
        }
      }catch(dbErr){
        console.warn('Could not write DIC user to DB (rules may block):',dbErr.message);
        /* Continue anyway - DIC doesn't need to be in DB */
      }

      currentUser={id:DIC_ID,name:'Depot In-Charge',role:'DIC',designation:'Depot In-Charge'};

      try{await loadUsers()}catch(e){console.warn('loadUsers:',e.message)}
      try{await loadHolidays()}catch(e){console.warn('loadHolidays:',e.message)}
      try{await loadSignatures()}catch(e){console.warn('loadSignatures:',e.message)}

      document.getElementById('dicDisplayId').textContent=DIC_ID+' | Admin (DIC)';
      switchView('dicView');
      renderSidebar();
      showTab('overview');
      showToast('Welcome, Admin','success');
      btn.disabled=false;btn.innerHTML='<i class="fa-solid fa-right-to-bracket"></i> Login';
      return;
    }

    /* === Regular User Login === */
    var snap=await db.ref('users/'+id).once('value');
    if(!snap.exists()){
      errEl.style.display='block';
      errEl.innerHTML='<i class="fa-solid fa-user-xmark" style="margin-right:6px"></i>User ID not found';
      btn.disabled=false;btn.innerHTML='<i class="fa-solid fa-right-to-bracket"></i> Login';
      return;
    }
    var data=snap.val();
    if(data.password!==pass){
      errEl.style.display='block';
      errEl.innerHTML='<i class="fa-solid fa-lock" style="margin-right:6px"></i>Wrong password';
      btn.disabled=false;btn.innerHTML='<i class="fa-solid fa-right-to-bracket"></i> Login';
      return;
    }
    if(data.active===false){
      errEl.style.display='block';
      errEl.innerHTML='<i class="fa-solid fa-ban" style="margin-right:6px"></i>Account is deactivated';
      btn.disabled=false;btn.innerHTML='<i class="fa-solid fa-right-to-bracket"></i> Login';
      return;
    }

    currentUser=data;
    try{await loadUsers()}catch(e){}
    try{await loadHolidays()}catch(e){}
    try{await loadSignatures()}catch(e){}

    document.getElementById('userDisplayInfo').textContent=id+' | '+(data.designation||'');
    switchView('userView');
    currentUTab='attendance';
    renderUserDashboard();
    showToast('Welcome, '+data.name,'success');

  }catch(e){
    console.error('Login error:',e);
    errEl.style.display='block';
    errEl.innerHTML='<i class="fa-solid fa-server" style="margin-right:6px"></i>Connection error: '+e.message+'<br><small style="color:var(--muted)">Check Firebase databaseURL and security rules</small>';
  }

  btn.disabled=false;
  btn.innerHTML='<i class="fa-solid fa-right-to-bracket"></i> Login';
}

function handleLogout(){currentUser=null;allUsers={};allHolidays={};allSignatures={};tourImageData=null;imgCache={};document.getElementById('loginId').value='';document.getElementById('loginPass').value='';document.getElementById('loginError').style.display='none';switchView('loginView')}

async function loadRecs(){var date=document.getElementById('recD').value;if(!date)return;var snap=await db.ref('attendance/'+date).once('value'),att=snap.val()||{};var aU=Object.entries(allUsers).filter(function(e){return e[0]!==DIC_ID&&e[1].active!==false});aU.sort(function(a,b){return desigOrder(a[1].designation)-desigOrder(b[1].designation)||a[1].name.localeCompare(b[1].name)});var rows='';for(var i=0;i<aU.length;i++){var uid=aU[i][0],u=aU[i][1],a=att[uid],s=getAttStatus(date,uid,a),letC=countShiftLETs(a);var stH=s?'<span class="badge '+s+'">'+s+'</span>':statusLabel(s);var appH=a?(a.approved?'<span class="approved-badge">Approved</span>':'<span class="pending-badge">Pending</span>'):(isAutoAbsent(date,uid,a)?'<span class="not-submitted-badge">Not Submitted</span>':'--');var s1H=(a&&a.shift1)?(a.shift1.inTime?formatTime12(a.shift1.inTime):'--')+'-'+(a.shift1.outTime?formatTime12(a.shift1.outTime):'--'):'--';var s2H=(a&&a.shift2)?(a.shift2.inTime?formatTime12(a.shift2.inTime):'--')+'-'+(a.shift2.outTime?formatTime12(a.shift2.outTime):'--'):'--';rows+='<tr><td style="font-weight:600">'+u.name+'</td><td>'+roleBadge(u.role)+'</td><td>'+stH+'</td><td style="font-size:11px">'+s1H+'</td><td style="font-size:11px">'+s2H+'</td><td>'+(letC>0?'<span style="color:#f59e0b;font-weight:700">'+letC+'</span>':'0')+'</td><td>'+appH+'</td><td><button class="btn btn-xs btn-warn" onclick="editRec(\''+date+'\',\''+uid+'\')"><i class="fa-solid fa-pen"></i></button>'+(a?'<button class="btn btn-xs btn-danger" onclick="delRec(\''+date+'\',\''+uid+'\')" style="margin-left:4px"><i class="fa-solid fa-trash"></i></button>':'')+'</td></tr>'}document.getElementById('recTbl').innerHTML='<table class="data-table"><thead><tr><th>Name</th><th>Role</th><th>Status</th><th>Shift 1</th><th>Shift 2</th><th>LET</th><th>Approval</th><th>Action</th></tr></thead><tbody>'+rows+'</tbody></table>'}
function editRec(date,uid){var u=allUsers[uid];db.ref('attendance/'+date+'/'+uid).once('value').then(function(snap){var ex=snap.val()||{};var s1i=ex.shift1&&ex.shift1.inTime?ex.shift1.inTime:SHIFT1_IN;var s1o=ex.shift1&&ex.shift1.outTime?ex.shift1.outTime:SHIFT1_OUT;var s2i=ex.shift2&&ex.shift2.inTime?ex.shift2.inTime:SHIFT2_IN;var s2o=ex.shift2&&ex.shift2.outTime?ex.shift2.outTime:SHIFT2_OUT;showModal('Edit - '+u.name,'<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px"><div class="form-group"><label class="form-label">Status</label><select class="form-select" id="eStat"><option value="P"'+(ex.status==='P'?' selected':'')+'>P</option><option value="A"'+(ex.status==='A'?' selected':'')+'>A</option><option value="T"'+(ex.status==='T'?' selected':'')+'>T</option><option value="L"'+(ex.status==='L'?' selected':'')+'>L</option><option value="H"'+(ex.status==='H'?' selected':'')+'>H</option></select></div><div></div><div class="form-group"><label class="form-label">S1 IN</label><input type="time" class="form-input" id="eS1i" value="'+s1i+'"></div><div class="form-group"><label class="form-label">S1 OUT</label><input type="time" class="form-input" id="eS1o" value="'+s1o+'"></div><div class="form-group"><label class="form-label">S2 IN</label><input type="time" class="form-input" id="eS2i" value="'+s2i+'"></div><div class="form-group"><label class="form-label">S2 OUT</label><input type="time" class="form-input" id="eS2o" value="'+s2o+'"></div></div>',async function(){await db.ref('attendance/'+date+'/'+uid).update({status:document.getElementById('eStat').value,approved:true,shift1:{inTime:document.getElementById('eS1i').value,outTime:document.getElementById('eS1o').value},shift2:{inTime:document.getElementById('eS2i').value,outTime:document.getElementById('eS2o').value}});showToast('Updated','success');loadRecs()})})}
function delRec(date,uid){showModal('Delete','<p style="color:var(--text2)">Delete this record?</p>',async function(){await db.ref('attendance/'+date+'/'+uid).remove();showToast('Deleted','info');loadRecs()})}

async function renderUsers(){await loadUsers();var uL=Object.entries(allUsers).sort(function(a,b){return desigOrder(a[1].designation)-desigOrder(b[1].designation)||a[1].name.localeCompare(b[1].name)});var rH='';for(var i=0;i<uL.length;i++){var k=uL[i][0],v=uL[i][1],isA=v.active!==false;var sb=isA?'<span class="active-badge">Active</span>':'<span class="inactive-badge">Inactive</span>';var isD=k===DIC_ID;var act=isD?'<span style="color:var(--danger);font-size:11px"><i class="fa-solid fa-crown"></i></span>':'<button class="btn btn-xs btn-secondary" onclick="showEditU(\''+k+'\')"><i class="fa-solid fa-pen"></i></button><label class="toggle-switch" style="margin-left:6px"><input type="checkbox" '+(isA?'checked':'')+' onchange="togActive(\''+k+'\',this.checked)"><span class="toggle-slider"></span></label>';var asgn='';if(v.role==='MPO'&&v.assignedAM&&allUsers[v.assignedAM])asgn='<br><span style="font-size:9px;color:#f59e0b">AM: '+allUsers[v.assignedAM].name+'</span>';if(v.role==='AM'&&v.assignedRSM&&allUsers[v.assignedRSM])asgn='<br><span style="font-size:9px;color:#a855f7">RSM: '+allUsers[v.assignedRSM].name+'</span>';rH+='<tr><td style="font-weight:600">'+v.name+asgn+'<br><span style="font-size:10px;color:var(--muted)">'+k+'</span></td><td style="font-size:11px;color:var(--accent)">'+(v.designation||'--')+'</td><td>'+roleBadge(v.role||'MPO')+'</td><td>'+(v.salary?'৳'+Number(v.salary).toLocaleString():'--')+'</td><td>'+sb+'</td><td style="white-space:nowrap">'+act+'</td></tr>'}document.getElementById('dicContent').innerHTML='<div class="fade-in"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;flex-wrap:wrap;gap:12px"><h2 style="font-size:22px;font-weight:800">Manage Users</h2><button class="btn btn-primary" onclick="showAddU()"><i class="fa-solid fa-user-plus"></i> Add User</button></div><div id="addUArea"></div><div class="card"><div style="overflow-x:auto"><table class="data-table"><thead><tr><th>Name / Assign</th><th>Desig</th><th>Role</th><th>Salary</th><th>Status</th><th>Action</th></tr></thead><tbody>'+rH+'</tbody></table></div></div></div>'}

async function createU(){var id=document.getElementById('nuId').value.trim(),pass=document.getElementById('nuPass').value.trim(),name=document.getElementById('nuName').value.trim(),desig=document.getElementById('nuDesig').value,depot=document.getElementById('nuDepot').value.trim(),mob=document.getElementById('nuMob').value.trim(),sal=parseFloat(document.getElementById('nuSal').value)||0,jd=document.getElementById('nuJD').value,role=getRoleFromDesig(desig),asgn=document.getElementById('nuAssign')?document.getElementById('nuAssign').value:'';if(!id||!pass||!name){showToast('ID, Pass, Name required','error');return}var ex=await db.ref('users/'+id).once('value');if(ex.exists()){showToast('ID exists','error');return}var ud={id:id,name:name,designation:desig,depot:depot,joinDate:jd,salary:sal,mobile:mob,role:role,password:pass,active:true,createdAt:Date.now()};if(role==='MPO'&&asgn)ud.assignedAM=asgn;if(role==='AM'&&asgn)ud.assignedRSM=asgn;await db.ref('users/'+id).set(ud);allUsers[id]=ud;showToast('Created: '+name,'success');renderUsers()}

var lastRpt=null;
async function genReport(){var m=parseInt(document.getElementById('rpM').value),y=parseInt(document.getElementById('rpY').value),days=getDaysInMonth(y,m);var uL=Object.entries(allUsers).filter(function(e){return e[0]!==DIC_ID&&e[1].active!==false}).sort(function(a,b){return desigOrder(a[1].designation)-desigOrder(b[1].designation)||a[1].name.localeCompare(b[1].name)});if(uL.length===0){showToast('No users','error');return}var cont=document.getElementById('rpArea');cont.innerHTML='<div style="text-align:center;padding:30px"><i class="fa-solid fa-spinner fa-spin" style="color:var(--muted)"></i></div>';var allAtt=await loadMonthAttendance(y,m);var hC='<th>Sl</th><th style="text-align:left">Name</th><th>Shift</th>';for(var d=1;d<=days;d++){var ds=y+'-'+String(m+1).padStart(2,'0')+'-'+String(d).padStart(2,'0');var fri=isFriday(ds),hol=isHoliday(ds);hC+='<th style="min-width:30px;'+(fri?'background:rgba(245,158,11,.08);color:#f59e0b':(hol?'background:rgba(168,85,247,.1);color:#a855f7':''))+'">'+d+'</th>'}hC+='<th>P</th><th>A</th><th>LET</th><th>H</th>';var bR='',allU=[];for(var ui=0;ui<uL.length;ui++){var uid=uL[ui][0],u=uL[ui][1];var counts={P:0,A:0,T:0,L:0,H:0},letC=0;var s1C='<td rowspan="3" style="font-weight:700;vertical-align:middle">'+(ui+1)+'</td><td rowspan="3" style="font-weight:600;text-align:left;vertical-align:middle">'+u.name+'</td><td><span style="color:#f59e0b;font-size:9px;font-weight:700">S1</span></td>';var s2C='<td><span style="color:#60a5fa;font-size:9px;font-weight:700">S2</span></td>';var stC='<td><span style="color:var(--text2);font-size:9px;font-weight:700">ATT</span></td>';for(var d=1;d<=days;d++){var ds=y+'-'+String(m+1).padStart(2,'0')+'-'+String(d).padStart(2,'0');var att=allAtt[ds]?allAtt[ds][uid]:null;var s=getAttStatus(ds,uid,att);if(s&&counts.hasOwnProperty(s))counts[s]++;letC+=countShiftLETs(att);var s1T='';if(att&&att.shift1)s1T=(att.shift1.inTime?formatTimeShort(att.shift1.inTime):'')+'-'+(att.shift1.outTime?formatTimeShort(att.shift1.outTime):'');var s2T='';if(att&&att.shift2)s2T=(att.shift2.inTime?formatTimeShort(att.shift2.inTime):'')+'-'+(att.shift2.outTime?formatTimeShort(att.shift2.outTime):'');var li=shiftLateHTML(att);s1C+='<td class="time-cell">'+s1T+'</td>';s2C+='<td class="time-cell">'+s2T+'</td>';stC+='<td>'+(s?'<span class="badge mini '+s+'">'+s+'</span>'+li:'')+'</td>'}s1C+='<td colspan="4"></td>';s2C+='<td colspan="4"></td>';stC+='<td style="font-weight:700;color:#00d4aa">'+counts.P+'</td><td style="font-weight:700;color:#ef4444">'+counts.A+'</td><td style="font-weight:800;color:#f59e0b">'+letC+'</td><td style="font-weight:700;color:#a855f7">'+counts.H+'</td>';bR+='<tr>'+s1C+'</tr><tr>'+s2C+'</tr><tr>'+stC+'</tr>';allU.push({uid:uid,u:u,counts:counts,letC:letC})}cont.innerHTML='<table class="rpt-table"><thead><tr>'+hC+'</tr></thead><tbody>'+bR+'</tbody></table>';lastRpt={m:m,y:y,days:days,users:allU,allAtt:allAtt}}

var lastSal=null;
async function genSal(){var m=parseInt(document.getElementById('salM').value),y=parseInt(document.getElementById('salY').value),days=getDaysInMonth(y,m);var users=Object.entries(allUsers).filter(function(e){return e[0]!==DIC_ID&&e[1].active!==false&&e[1].salary>0}).sort(function(a,b){return desigOrder(a[1].designation)-desigOrder(b[1].designation)||a[1].name.localeCompare(b[1].name)});if(users.length===0){document.getElementById('salArea').innerHTML='<div style="text-align:center;padding:40px;color:var(--muted)">No users with salary</div>';return}var allAtt=await loadMonthAttendance(y,m);var rows='',tB=0,tAD=0,tLD=0,tN=0;for(var i=0;i<users.length;i++){var uid=users[i][0],u=users[i][1];var counts={P:0,A:0,T:0,L:0,H:0},letC=0;for(var d=1;d<=days;d++){var ds=y+'-'+String(m+1).padStart(2,'0')+'-'+String(d).padStart(2,'0');var att=allAtt[ds]?allAtt[ds][uid]:null;var s=getAttStatus(ds,uid,att);if(s&&counts.hasOwnProperty(s))counts[s]++;letC+=countShiftLETs(att)}var basic=u.salary,rate=Math.round(basic/days);var absD=Math.round(rate*counts.A);var letDD=Math.floor(letC/3);var letDA=Math.round(rate*letDD);var net=basic-absD-letDA;tB+=basic;tAD+=absD;tLD+=letDA;tN+=net;rows+='<tr><td style="font-weight:700">'+(i+1)+'</td><td style="font-weight:600">'+u.name+'</td><td style="color:var(--text2)">'+u.designation+'</td><td style="color:var(--accent)">৳'+basic.toLocaleString()+'</td><td style="color:var(--text2)">৳'+rate.toLocaleString()+'</td><td style="color:#00d4aa;font-weight:700">'+counts.P+'</td><td style="color:#ef4444;font-weight:700">'+counts.A+'</td><td style="color:#f59e0b;font-weight:800">'+letC+'</td><td style="color:#ef4444">৳'+absD.toLocaleString()+'</td><td style="color:#f59e0b;background:rgba(245,158,11,.06)">৳'+letDA+' ('+letDD+'d)</td><td style="color:var(--accent);font-weight:800">৳'+net.toLocaleString()+'</td><td style="color:var(--muted)">&nbsp;</td></tr>'}document.getElementById('salArea').innerHTML='<table class="rpt-table"><thead><tr><th>Sl</th><th>Name</th><th>Desig</th><th>Basic</th><th>Rate</th><th>P</th><th>A</th><th style="background:rgba(245,158,11,.1)">LET</th><th>Abs Ded</th><th style="background:rgba(245,158,11,.1)">LET Ded</th><th>Net</th><th>Sign</th></tr></thead><tbody>'+rows+'</tbody><tfoot><tr style="font-weight:800;border-top:2px solid var(--border2)"><td colspan="3" style="text-align:right">TOTAL</td><td style="color:var(--accent)">৳'+tB.toLocaleString()+'</td><td></td><td></td><td></td><td></td><td style="color:#ef4444">৳'+tAD.toLocaleString()+'</td><td style="color:#f59e0b;background:rgba(245,158,11,.06)">৳'+tLD.toLocaleString()+'</td><td style="color:var(--accent);font-size:16px">৳'+tN.toLocaleString()+'</td><td></td></tr></tfoot></table><div style="margin-top:16px;padding:14px 18px;background:rgba(245,158,11,.06);border:1px solid rgba(245,158,11,.15);border-radius:10px;font-size:13px;color:var(--text2)"><i class="fa-solid fa-info-circle" style="color:#f59e0b;margin-right:6px"></i><strong style="color:#f59e0b">LET Rule:</strong> 3 LET (Late Shift Entry) = 1 Day Salary Deduction</div>';lastSal={m:m,y:y,days:days,users:users,allAtt:allAtt,tB:tB,tAD:tAD,tLD:tLD,tN:tN}}

/* ===== DIC HOLIDAYS ===== */
async function renderHolidays(){await loadHolidays();var sorted=Object.entries(allHolidays).sort(function(a,b){return a[0].localeCompare(b[0])}),listHTML='';if(sorted.length>0){var rh='';for(var i=0;i<sorted.length;i++){var dd=sorted[i][0],n=sorted[i][1];rh+='<tr><td style="font-weight:600">'+formatBD(dd)+'</td><td><span class="holiday-badge">'+n+'</span></td><td><button class="btn btn-xs btn-danger" onclick="remHol(\''+dd+'\')"><i class="fa-solid fa-trash"></i></button></td></tr>'}listHTML='<table class="data-table"><thead><tr><th>Date</th><th>Holiday</th><th>Action</th></tr></thead><tbody>'+rh+'</tbody></table>'}else{listHTML='<div style="text-align:center;padding:30px;color:var(--muted)">No custom holidays</div>'}document.getElementById('dicContent').innerHTML='<div class="fade-in"><h2 style="font-size:22px;font-weight:800;margin-bottom:20px">Holidays</h2><div class="card" style="margin-bottom:20px"><h3 style="font-size:16px;font-weight:700;margin-bottom:16px">Add Holiday</h3><div style="display:flex;gap:14px;align-items:end;flex-wrap:wrap"><div class="form-group" style="margin:0;min-width:180px"><label class="form-label">Date</label><input type="date" class="form-input" id="holD"></div><div class="form-group" style="margin:0;min-width:250px"><label class="form-label">Name</label><input class="form-input" id="holN" placeholder="Holiday name"></div><button class="btn btn-primary" onclick="addHol()"><i class="fa-solid fa-plus"></i> Add</button></div></div><div class="card"><h3 style="font-size:16px;font-weight:700;margin-bottom:16px">Custom Holiday List ('+sorted.length+')</h3>'+listHTML+'</div></div>'}
async function addHol(){var date=document.getElementById('holD').value,name=document.getElementById('holN').value.trim();if(!date||!name){showToast('Date and name required','error');return}await db.ref('holidays/'+date).set(name);allHolidays[date]=name;showToast('Added','success');renderHolidays()}
async function remHol(date){showModal('Remove','<p style="color:var(--text2)">Remove holiday?</p>',async function(){await db.ref('holidays/'+date).remove();delete allHolidays[date];showToast('Removed','info');renderHolidays()})}

/* ===== DIC SETTINGS ===== */
async function renderSettings(){await loadSignatures();var dicSig=allSignatures.dic||'',rsmSig=allSignatures.rsm||'';var dicPrev=dicSig?'<img src="'+dicSig+'" class="sig-preview"><button class="btn btn-xs btn-danger" onclick="remSig(\'dic\')" style="margin-top:8px"><i class="fa-solid fa-trash"></i></button>':'<i class="fa-solid fa-cloud-arrow-up" style="font-size:28px;color:var(--muted)"></i>';var rsmPrev=rsmSig?'<img src="'+rsmSig+'" class="sig-preview"><button class="btn btn-xs btn-danger" onclick="remSig(\'rsm\')" style="margin-top:8px"><i class="fa-solid fa-trash"></i></button>':'<i class="fa-solid fa-cloud-arrow-up" style="font-size:28px;color:var(--muted)"></i>';document.getElementById('dicContent').innerHTML='<div class="fade-in"><h2 style="font-size:22px;font-weight:800;margin-bottom:20px">Settings</h2><div class="card" style="margin-bottom:20px"><h3 style="font-size:16px;font-weight:700;margin-bottom:16px"><i class="fa-solid fa-signature" style="color:var(--accent);margin-right:8px"></i>Signature Upload</h3><div style="display:grid;grid-template-columns:1fr 1fr;gap:20px"><div><label class="form-label" style="color:var(--accent)">Depot In-Charge</label><div class="sig-upload-area '+(dicSig?'has-sig':'')+'" onclick="document.getElementById(\'dicSigInp\').click()"><input type="file" id="dicSigInp" class="sig-file-input" accept="image/*" onchange="uploadSig(\'dic\',this)">'+dicPrev+'</div></div><div><label class="form-label" style="color:#60a5fa">RSM / Sr.RSM</label><div class="sig-upload-area '+(rsmSig?'has-sig':'')+'" onclick="document.getElementById(\'rsmSigInp\').click()"><input type="file" id="rsmSigInp" class="sig-file-input" accept="image/*" onchange="uploadSig(\'rsm\',this)">'+rsmPrev+'</div></div></div></div><div class="card" style="border-color:rgba(59,130,246,.2)"><h3 style="font-size:16px;font-weight:700;margin-bottom:16px"><i class="fa-solid fa-clock" style="color:#60a5fa;margin-right:8px"></i>Shift Times</h3><div style="display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:16px"><div class="form-group" style="margin:0"><label class="form-label">S1 Start</label><input type="time" class="form-input" value="'+SHIFT1_IN+'" disabled></div><div class="form-group" style="margin:0"><label class="form-label">S1 End</label><input type="time" class="form-input" value="'+SHIFT1_OUT+'" disabled></div><div class="form-group" style="margin:0"><label class="form-label">S2 Start</label><input type="time" class="form-input" value="'+SHIFT2_IN+'" disabled></div><div class="form-group" style="margin:0"><label class="form-label">S2 End</label><input type="time" class="form-input" value="'+SHIFT2_OUT+'" disabled></div></div><div style="margin-top:12px;padding:12px 16px;background:rgba(245,158,11,.06);border:1px solid rgba(245,158,11,.15);border-radius:10px;font-size:12px;color:var(--text2)"><i class="fa-solid fa-info-circle" style="color:#f59e0b;margin-right:6px"></i>S1: '+formatTime12(SHIFT1_IN)+'-'+formatTime12(SHIFT1_OUT)+' | S2: '+formatTime12(SHIFT2_IN)+'-'+formatTime12(SHIFT2_OUT)+' | 3 LET = 1 Day Deduction</div></div></div>'}

async function uploadSig(role,inputEl){var file=inputEl.files[0];if(!file)return;showToast('Processing...','info');try{var data=await compressSignature(file);await db.ref('signatures/'+role).set(data);allSignatures[role]=data;showToast('Uploaded','success');renderSettings()}catch(e){showToast('Failed: '+e.message,'error')}}
async function remSig(role){showModal('Remove','<p style="color:var(--text2)">Remove signature?</p>',async function(){await db.ref('signatures/'+role).remove();delete allSignatures[role];showToast('Removed','info');renderSettings()})}

document.addEventListener('DOMContentLoaded',function(){document.getElementById('loginId').focus()});
</script>
